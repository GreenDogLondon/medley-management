<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Medley — GP & Cost Calculator</title>
<style>
:root {
  --teal:#1a6b5a; --teal-l:#e8f4f1; --teal-d:#134f43;
  --orange:#e8571a; --orange-l:#fdf0ea;
  --good:#1a6b5a; --good-bg:#e8f4f1;
  --mid:#8a5200; --mid-bg:#fef3e2;
  --bad:#a32d2d; --bad-bg:#fdeaea;
  --bg:#f7f8f6; --bg2:#ffffff; --border:#dde5e2;
  --text:#1a2620; --muted:#7a8f89; --small:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}

/* ── Top bar ── */
.topbar{background:var(--teal);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-weight:800;font-size:17px;letter-spacing:0.04em}
.brand em{color:#a8d9cf;font-style:normal;font-weight:400;font-size:13px;margin-left:10px}
.inv-badge{background:rgba(255,255,255,.15);font-size:11px;padding:3px 10px;border-radius:20px;letter-spacing:.02em}

/* ── Nav tabs ── */
nav{background:#fff;border-bottom:2px solid var(--border);display:flex;padding:0 16px;position:sticky;top:45px;z-index:99}
.navtab{border:none;background:none;padding:11px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.navtab:hover{color:var(--teal)}
.navtab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:700}

/* ── Content ── */
#content{padding:16px 20px;max-width:1200px;margin:0 auto}

/* ── Tab header ── */
.tab-header{margin-bottom:14px}
.tab-title{font-size:16px;font-weight:800;color:var(--teal)}
.tab-sub{font-size:11px;color:var(--muted);margin-top:3px;display:block}

/* ── Master table ── */
.master-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.master-bar input,.master-bar select{height:30px;border:1px solid var(--border);border-radius:6px;padding:0 8px;font-size:12px;color:var(--text)}
.master-table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.master-table thead tr{background:var(--teal);color:#fff}
.master-table thead th{padding:8px 10px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.master-table th.num,.master-table td.num{text-align:right}
.master-table tbody tr{border-bottom:1px solid var(--border);transition:.1s}
.master-table tbody tr:hover{background:var(--teal-l)}
.master-table tbody tr.editing-row{background:#fffbf5;border-left:3px solid var(--orange)}
.master-table td{padding:7px 10px;vertical-align:middle}
.master-table td input{border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;width:100%}
.table-footer{font-size:11px;color:var(--muted);margin-top:6px;padding-left:4px}
.cat-badge{background:var(--teal-l);color:var(--teal);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.cat-badge.ops{background:#f0ebfb;color:#5b3c99}
.cat-badge.dry{background:var(--orange-l);color:var(--orange)}
.teal-bold{color:var(--teal);font-weight:700}
.bold{font-weight:600}
.muted{color:var(--muted)}
.small{font-size:11px}

/* ── Buttons ── */
.btn-teal{background:var(--teal);color:#fff;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.btn-teal:hover{background:var(--teal-d)}
.btn-sm{border:1px solid var(--border);background:#fff;border-radius:5px;padding:3px 9px;cursor:pointer;font-size:11px;color:var(--text)}
.btn-sm:hover{border-color:var(--teal);color:var(--teal)}
.btn-sm.del{border-color:#fca5a5;color:var(--bad)}
.btn-sm.del:hover{background:#fdeaea}
.del-btn{border:none;background:none;color:#ccc;cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
.del-btn:hover{color:var(--bad)}
.actions{display:flex;gap:4px;justify-content:flex-end;white-space:nowrap}

/* ── GP Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.ml{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.mv{font-size:22px;font-weight:800;color:var(--teal);line-height:1.2;margin:3px 0}
.mv.small-text{font-size:14px;margin:4px 0}
.ms{font-size:11px;color:var(--muted)}
.target-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:12px;color:var(--muted)}
.target-row input[type=range]{width:140px;accent-color:var(--teal)}
.tv{font-weight:700;color:var(--teal);min-width:36px}

/* ── GP table ── */
.gp-table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.gp-table colgroup col{}
.gp-table thead tr{background:var(--teal);color:#fff}
.gp-table thead th{padding:8px 10px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.gp-table th.num,.gp-table td.num{text-align:right}
.gp-row{cursor:pointer;transition:.1s}
.gp-row:hover{background:var(--teal-l)}
.gp-row.expanded{background:var(--teal-l)}
.gp-table td{padding:8px 10px;vertical-align:middle;border-bottom:1px solid var(--border)}
.xi{color:var(--teal);font-size:10px;margin-right:6px;opacity:.7}
.sell-in{width:62px;text-align:right;border:1px solid var(--border);border-radius:4px;padding:3px 5px;font-size:12px;font-weight:600;color:var(--teal)}
.psym{color:var(--muted);font-size:11px;margin-right:1px}
.pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.pill.good{background:var(--good-bg);color:var(--good)}
.pill.mid{background:var(--mid-bg);color:var(--mid)}
.pill.bad{background:var(--bad-bg);color:var(--bad)}

/* ── Recipe panel ── */
.expand-row td{background:#f0f7f5;padding:0 !important;border-bottom:2px solid var(--teal)}
.recipe-panel{padding:14px 20px}
.recipe-header{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.recipe-table{width:100%;border-collapse:collapse;font-size:12px}
.recipe-table thead th{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;padding:4px 8px;border-bottom:1px solid var(--border)}
.recipe-table th.num,.recipe-table td.num{text-align:right}
.recipe-table td{padding:5px 8px;vertical-align:middle;border-bottom:1px solid #e8f0ee}
.recipe-table tr:last-child td{border-bottom:none}
.recipe-total td{background:rgba(26,107,90,.08);font-weight:700;padding:6px 8px}
.master-tag{background:var(--teal-l);color:var(--teal);font-size:10px;padding:1px 5px;border-radius:3px;font-weight:700;font-family:monospace}
.master-tag.custom{background:var(--orange-l);color:var(--orange)}
.qty-in{width:65px;text-align:right;border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:12px}
.cost-in{width:65px;text-align:right;border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:12px}

/* ── Add ingredient ── */
.add-ing-section{margin-top:12px;padding-top:10px;border-top:1px dashed var(--border)}
.add-ing-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.add-ing-row select,.add-ing-row input{height:28px;border:1px solid var(--border);border-radius:5px;padding:0 8px;font-size:12px;color:var(--text)}
.form-label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;font-weight:600}
.ing-preview{font-size:12px;font-weight:700;color:var(--teal);min-width:70px}

/* ── Responsive ── */
@media(max-width:768px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .master-table td:nth-child(2),.master-table th:nth-child(2),
  .master-table td:nth-child(4),.master-table th:nth-child(4){display:none}
}

/* ── Login screen ── */
#login-screen{position:fixed;inset:0;background:var(--teal);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:0}
.login-box{background:#fff;border-radius:16px;padding:40px 44px;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
.login-logo{font-size:26px;font-weight:900;color:var(--teal);letter-spacing:.05em;margin-bottom:4px}
.login-logo span{color:var(--orange)}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:28px}
.login-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:left;display:block;margin-bottom:5px}
.login-input{width:100%;height:42px;border:2px solid var(--border);border-radius:8px;padding:0 14px;font-size:14px;outline:none;transition:.2s;margin-bottom:10px}
.login-input:focus{border-color:var(--teal)}
.login-btn{width:100%;height:42px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;margin-top:4px}
.login-btn:hover{background:var(--teal-d)}
.login-error{color:var(--bad);font-size:12px;margin-top:8px;display:none}
.login-hint{font-size:11px;color:var(--muted);margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ── Topbar enhancements ── */
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.save-status{font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap}
.save-status.ok{color:#a8d9cf}
.tb-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:6px;padding:4px 11px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s}
.tb-btn:hover{background:rgba(255,255,255,.28)}
.tb-import{position:relative;overflow:hidden}
.tb-import input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
</style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-logo">THE MEDLEY<span>.</span></div>
    <div class="login-sub">GP &amp; Operations Calculator · Management Access</div>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="pwd-input" placeholder="Enter password"
      onkeydown="if(event.key==='Enter')attemptLogin()">
    <button class="login-btn" onclick="attemptLogin()">Enter</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
    <div class="login-hint">Access restricted to Medley management team.<br>Contact Charlie to request access.</div>
  </div>
</div>

<div class="topbar">
  <div class="brand">THE MEDLEY <em>GP & Cost Calculator</em></div>
  <div class="topbar-right">
    <span class="save-status" id="save-status">Not saved yet</span>
    <button class="tb-btn" onclick="exportData()" title="Download your data as a JSON backup file">↓ Export</button>
    <div class="tb-btn tb-import" title="Import a previously exported JSON file">
      ↑ Import
      <input type="file" accept=".json" onchange="importData(this)">
    </div>
  </div>
</div>

<nav>

</nav>

<div id="content"></div>

/* ════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════ */
let activeTab = 'wet';
let expandedId = null;
let expandedType = null;
let editingMId = null;
let target = 70;
let mFilter = '';
let nextIds = {D:80, F:90, O:20};
let nextWet = 40;
let nextDry = 20;

/* ════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════ */
function getMaster(id){ return MASTERS.find(m=>m.id===id) }

function cpu(m){
  if(!m||!m.size) return 0;
  return m.cost/m.size;
}

function ingCost(ri){
  if(ri.mid){
    const m=getMaster(ri.mid);
    return m ? ri.qty*cpu(m) : 0;
  }
  return ri.c||0;
}

function ingLabel(ri){
  if(ri.mid){
    const m=getMaster(ri.mid);
    return m ? `${m.name} — ${ri.qty}${m.unit}` : `[deleted] — ${ri.qty}`;
  }
  return ri.n||'Custom';
}

function totalCost(item){ return item.recipe.reduce((s,r)=>s+ingCost(r),0) }

function gpPct(item){
  const c=totalCost(item);
  return item.sell>0 ? ((item.sell-c)/item.sell*100) : 0;
}

function gpPill(pct){
  const cls=pct>=target?'good':pct>=target-10?'mid':'bad';
  return `<span class="pill ${cls}">${pct.toFixed(1)}%</span>`;
}

function fmtCpu(m){
  const c=cpu(m);
  if(m.unit==='ml'){
    if(c<0.01) return `£${(c*1000).toFixed(3)}/L`;
    return `£${(c*100).toFixed(3)}/100ml`;
  }
  if(m.unit==='g') return `£${(c*100).toFixed(4)}/100g`;
  if(m.unit==='each'||m.unit==='pint'||m.unit==='sprig'||m.unit==='pack')
    return `£${c.toFixed(4)}/ea`;
  return `£${c.toFixed(5)}/${m.unit}`;
}

function fmtCpuDisplay(m){
  // More human-readable for table display
  const c=cpu(m);
  if(m.unit==='ml'){
    if(c>=0.001) return `£${(c*1000).toFixed(2)}/L`;
    return `£${(c*100).toFixed(3)}/100ml`;
  }
  if(m.unit==='g') return `£${(c*1000).toFixed(2)}/kg`;
  return `£${c.toFixed(3)} each`;
}

function getGP(type){ return type==='wet'?WET_GP:DRY_GP }

/* ════════════════════════════════════════════
   MASTER RENDER
   ════════════════════════════════════════════ */
function renderMaster(type){
  const all=MASTERS.filter(m=>m.type===type);
  const filtered=mFilter
    ? all.filter(m=>m.name.toLowerCase().includes(mFilter.toLowerCase())||m.cat.toLowerCase().includes(mFilter.toLowerCase())||m.sup.toLowerCase().includes(mFilter.toLowerCase()))
    : all;

  const cats=[...new Set(all.map(m=>m.cat))].sort();

  let h=`<div class="master-bar">
    <input type="text" placeholder="Search name, category, supplier…" value="${mFilter}"
      oninput="mFilter=this.value;render()" style="width:240px">
    <select onchange="mFilter=this.value;render()">
      <option value="">All categories (${all.length})</option>
      ${cats.map(c=>`<option${mFilter===c?' selected':''}>${c}</option>`).join('')}
    </select>
    <button class="btn-teal" onclick="addMaster('${type}')">+ Add ingredient</button>
  </div>
  <table class="master-table">
    <thead><tr>
      <th>Name</th><th>Supplier</th><th>Category</th><th>Pack / Purchase unit</th>
      <th class="num">Pack £</th><th class="num">Size</th><th class="num">Unit</th>
      <th class="num" style="background:rgba(255,255,255,.15)">Cost / unit</th><th></th>
    </tr></thead>
    <tbody>`;

  filtered.forEach(m=>{
    const isEd=editingMId===m.id;
    if(isEd){
      h+=`<tr class="editing-row">
        <td><input id="e-n" value="${esc(m.name)}" style="width:100%"></td>
        <td><input id="e-s" value="${esc(m.sup)}" style="width:100%"></td>
        <td><input id="e-c" value="${esc(m.cat)}" style="width:100%"></td>
        <td><input id="e-p" value="${esc(m.pack)}" style="width:100%"></td>
        <td class="num"><input id="e-co" type="number" step="0.01" value="${m.cost}" style="width:70px;text-align:right"></td>
        <td class="num"><input id="e-si" type="number" step="0.001" value="${m.size}" style="width:70px;text-align:right"></td>
        <td class="num"><input id="e-u" value="${m.unit}" style="width:50px"></td>
        <td class="num teal-bold">${fmtCpuDisplay(m)}</td>
        <td class="actions">
          <button class="btn-sm btn-teal" onclick="saveMaster('${m.id}')">✓ Save</button>
          <button class="btn-sm" onclick="editingMId=null;render()">✕</button>
        </td></tr>`;
    } else {
      h+=`<tr>
        <td class="bold">${m.name}</td>
        <td class="muted">${m.sup}</td>
        <td><span class="cat-badge${m.type==='O'?' ops':''}">${m.cat}</span></td>
        <td class="muted small">${m.pack}</td>
        <td class="num">£${m.cost.toFixed(2)}</td>
        <td class="num">${m.size}</td>
        <td class="num muted">${m.unit}</td>
        <td class="num teal-bold">${fmtCpuDisplay(m)}</td>
        <td class="actions">
          <button class="btn-sm" onclick="editingMId='${m.id}';render()">Edit</button>
          <button class="btn-sm del" onclick="delMaster('${m.id}')">✕</button>
        </td></tr>`;
    }
  });

  h+=`</tbody></table>
  <div class="table-footer">${filtered.length} of ${all.length} ingredients${mFilter?' (filtered)':''}</div>`;
  return h;
}

/* ════════════════════════════════════════════
   MASTER CRUD
   ════════════════════════════════════════════ */
function saveMaster(id){
  const m=getMaster(id);
  if(!m)return;
  m.name=document.getElementById('e-n').value.trim()||m.name;
  m.sup=document.getElementById('e-s').value.trim();
  m.cat=document.getElementById('e-c').value.trim();
  m.pack=document.getElementById('e-p').value.trim();
  m.cost=parseFloat(document.getElementById('e-co').value)||m.cost;
  m.size=parseFloat(document.getElementById('e-si').value)||m.size;
  m.unit=document.getElementById('e-u').value.trim()||m.unit;
  editingMId=null;
  render();
}

function delMaster(id){
  if(!confirm('Remove this ingredient? Linked GP recipes will show £0 for this ingredient.'))return;
  MASTERS=MASTERS.filter(m=>m.id!==id);
  render();
}

function addMaster(type){
  const prefix={D:'DM',F:'FM',O:'OM'}[type];
  const id=prefix+nextIds[type]++;
  MASTERS.push({id,type,name:'New ingredient',sup:'',cat:'',pack:'',cost:0,size:1,unit:'g'});
  editingMId=id;
  mFilter='';
  render();
}

/* ════════════════════════════════════════════
   GP RENDER
   ════════════════════════════════════════════ */
function renderGP(gpType){
  const items=getGP(gpType);
  const avgGP=items.length ? items.reduce((s,i)=>s+gpPct(i),0)/items.length : 0;
  const totalSell=items.reduce((s,i)=>s+i.sell,0);
  const totalGPVal=items.reduce((s,i)=>s+(i.sell-totalCost(i)),0);
  const onTarget=items.filter(i=>gpPct(i)>=target).length;
  const best=items.length?items.reduce((a,b)=>gpPct(a)>gpPct(b)?a:b):null;
  const col=avgGP>=target?'var(--good)':avgGP>=target-10?'var(--mid)':'var(--bad)';

  let h=`
  <div class="metrics">
    <div class="metric"><div class="ml">Average GP%</div>
      <div class="mv" style="color:${col}">${avgGP.toFixed(1)}%</div>
      <div class="ms">Target ${target}%</div></div>
    <div class="metric"><div class="ml">Menu sell value</div>
      <div class="mv">£${totalSell.toFixed(2)}</div>
      <div class="ms">GP pot £${totalGPVal.toFixed(2)}</div></div>
    <div class="metric"><div class="ml">At / above target</div>
      <div class="mv">${onTarget} / ${items.length}</div>
      <div class="ms">${items.length?Math.round(onTarget/items.length*100):0}% of items</div></div>
    <div class="metric"><div class="ml">Best performer</div>
      <div class="mv small-text">${best?best.name:'—'}</div>
      <div class="ms">${best?gpPct(best).toFixed(1)+'%':''}</div></div>
  </div>
  <div class="target-row">
    <label>Target GP%</label>
    <input type="range" min="50" max="85" value="${target}"
      oninput="target=+this.value;this.nextElementSibling.textContent=this.value+'%';render()">
    <span class="tv">${target}%</span>
  </div>
  <table class="gp-table">
    <colgroup>
      <col style="width:26%"><col style="width:16%"><col style="width:12%">
      <col style="width:12%"><col style="width:12%"><col style="width:12%"><col style="width:5%">
    </colgroup>
    <thead><tr>
      <th>Item</th><th>Category</th><th class="num">Sell £</th>
      <th class="num">Cost £</th><th class="num">GP £</th><th class="num">GP%</th><th></th>
    </tr></thead>
    <tbody>`;

  items.forEach(item=>{
    const cost=totalCost(item);
    const pct=gpPct(item);
    const isExp=expandedId===item.id && expandedType===gpType;

    h+=`<tr class="gp-row${isExp?' expanded':''}" onclick="toggleExp(${item.id},'${gpType}')">
      <td><span class="xi">${isExp?'▼':'▶'}</span><strong>${item.name}</strong></td>
      <td><span class="cat-badge${gpType==='dry'?' dry':''}">${item.cat}</span></td>
      <td class="num" onclick="event.stopPropagation()">
        <span class="psym">£</span><input class="sell-in" type="number" step="0.05"
          value="${item.sell.toFixed(2)}"
          onchange="setSell(${item.id},'${gpType}',+this.value)"
          onclick="event.stopPropagation()">
      </td>
      <td class="num">£${cost.toFixed(2)}</td>
      <td class="num">£${(item.sell-cost).toFixed(2)}</td>
      <td class="num">${gpPill(pct)}</td>
      <td><button class="del-btn" onclick="delItem(${item.id},'${gpType}',event)">✕</button></td>
    </tr>`;

    if(isExp){
      h+=`<tr class="expand-row"><td colspan="7"><div class="recipe-panel">
        <div class="recipe-header">Recipe — ${item.name}</div>
        <table class="recipe-table">
          <thead><tr>
            <th style="width:34%">Ingredient</th>
            <th style="width:28%">Master ID / pack</th>
            <th class="num" style="width:18%">Qty / cost</th>
            <th class="num" style="width:14%">£ cost</th>
            <th style="width:6%"></th>
          </tr></thead>
          <tbody>`;

      item.recipe.forEach((ri,idx)=>{
        const m=ri.mid?getMaster(ri.mid):null;
        const rCost=ingCost(ri);
        const name=ri.mid?(m?m.name:'[deleted master]'):(ri.n||'Custom');
        const midTag=m
          ?`<span class="master-tag">${m.id}</span> <span class="muted small">${m.pack.split('·')[0].trim()}</span>`
          :`<span class="master-tag custom">manual</span>`;

        h+=`<tr>
          <td>${name}</td>
          <td>${midTag}</td>
          <td class="num">`;

        if(ri.mid && m){
          h+=`<input class="qty-in" type="number" step="${m.unit==='each'||m.unit==='pint'||m.unit==='sprig'?'0.1':'1'}"
              value="${ri.qty}"
              onchange="setQty(${item.id},'${gpType}',${idx},+this.value)"
              onclick="event.stopPropagation()"> <span class="muted small">${m.unit}</span>`;
        } else {
          h+=`£<input class="cost-in" type="number" step="0.01"
              value="${(ri.c||0).toFixed(2)}"
              onchange="setCost(${item.id},'${gpType}',${idx},+this.value)"
              onclick="event.stopPropagation()">`;
        }

        h+=`</td>
          <td class="num teal-bold">£${rCost.toFixed(3)}</td>
          <td><button class="del-btn" onclick="delIng(${item.id},'${gpType}',${idx},event)">✕</button></td>
        </tr>`;
      });

      h+=`<tr class="recipe-total">
          <td colspan="3"><strong>Total cost per serve</strong></td>
          <td class="num teal-bold"><strong>£${cost.toFixed(3)}</strong></td>
          <td></td>
        </tr>
        </tbody></table>

        <!-- ── Add ingredient from master ── -->
        <div class="add-ing-section" onclick="event.stopPropagation()">
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Add ingredient</div>
          <div class="add-ing-row">
            <select id="ms-${item.id}" style="flex:2;min-width:200px" onchange="onMSel(${item.id})">
              <option value="">— select from master —</option>`;

      // Group master dropdown by type
      [{t:'D',label:'Drink Master'},{t:'F',label:'Food Master'},{t:'O',label:'Ops & Misc'}].forEach(({t,label})=>{
        const ms=MASTERS.filter(m=>m.type===t);
        if(!ms.length)return;
        h+=`<optgroup label="${label}">`;
        const cats=[...new Set(ms.map(m=>m.cat))].sort();
        cats.forEach(cat=>{
          ms.filter(m=>m.cat===cat).forEach(m=>{
            h+=`<option value="${m.id}">[${m.id}] ${m.name} — ${fmtCpuDisplay(m)}</option>`;
          });
        });
        h+=`</optgroup>`;
      });

      h+=`</select>
            <input type="number" id="mq-${item.id}" placeholder="qty" step="1" style="width:80px" oninput="onQtyIn(${item.id})">
            <span id="mu-${item.id}" class="muted small" style="min-width:30px"></span>
            <span id="mp-${item.id}" class="ing-preview" style="min-width:70px"></span>
            <button class="btn-sm btn-teal" onclick="addFromMaster(${item.id},'${gpType}')">Add ↓</button>
          </div>
          <div class="add-ing-row" style="margin-top:8px">
            <span class="muted small" style="white-space:nowrap">or custom:</span>
            <input type="text" id="cn-${item.id}" placeholder="Ingredient name" style="flex:2">
            <span style="color:var(--muted);font-size:12px">£</span>
            <input type="number" id="cc-${item.id}" placeholder="0.00" step="0.01" style="width:80px">
            <button class="btn-sm btn-teal" onclick="addCustom(${item.id},'${gpType}')">Add ↓</button>
          </div>
        </div>
      </div></td></tr>`;
    }
  });

  h+=`</tbody></table>
  <div style="display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap">
    <button class="btn-teal" onclick="document.getElementById('ngf-${gpType}').style.display='block'">+ Add menu item</button>
  </div>
  <div id="ngf-${gpType}" style="display:none;margin-top:10px;padding:14px;background:#fff;border:1px solid var(--border);border-radius:8px">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
      <div><label class="form-label">Item name</label>
        <input id="nn-${gpType}" placeholder="e.g. Negroni" style="width:180px;height:30px;border:1px solid var(--border);border-radius:5px;padding:0 8px;font-size:12px">
      </div>
      <div><label class="form-label">Category</label>
        <select id="nc-${gpType}" style="height:30px;border:1px solid var(--border);border-radius:5px;padding:0 8px;font-size:12px">
          ${[...new Set(items.map(i=>i.cat))].map(c=>`<option>${c}</option>`).join('')}
        </select>
      </div>
      <div><label class="form-label">Sell price £</label>
        <input id="np-${gpType}" type="number" step="0.50" placeholder="0.00" style="width:80px;height:30px;border:1px solid var(--border);border-radius:5px;padding:0 8px;font-size:12px;text-align:right">
      </div>
      <button class="btn-teal" onclick="addItem('${gpType}')">Add item</button>
      <button class="btn-sm" onclick="document.getElementById('ngf-${gpType}').style.display='none'">Cancel</button>
    </div>
  </div>`;

  return h;
}

/* ════════════════════════════════════════════
   GP EVENT HANDLERS
   ════════════════════════════════════════════ */
function toggleExp(id,type){
  if(expandedId===id&&expandedType===type){expandedId=null;expandedType=null;}
  else{expandedId=id;expandedType=type;}
  render();
}

function setSell(id,type,val){
  const item=getGP(type).find(i=>i.id===id);
  if(item){item.sell=val;render();}
}

function setQty(id,type,idx,val){
  const item=getGP(type).find(i=>i.id===id);
  if(item&&item.recipe[idx]){item.recipe[idx].qty=val;render();}
}

function setCost(id,type,idx,val){
  const item=getGP(type).find(i=>i.id===id);
  if(item&&item.recipe[idx]){item.recipe[idx].c=val;render();}
}

function delIng(id,type,idx,e){
  e.stopPropagation();
  const item=getGP(type).find(i=>i.id===id);
  if(item){item.recipe.splice(idx,1);render();}
}

function delItem(id,type,e){
  e.stopPropagation();
  if(!confirm('Remove this menu item?'))return;
  if(type==='wet')WET_GP=WET_GP.filter(i=>i.id!==id);
  else DRY_GP=DRY_GP.filter(i=>i.id!==id);
  if(expandedId===id){expandedId=null;expandedType=null;}
  render();
}

function onMSel(itemId){
  const sel=document.getElementById(`ms-${itemId}`);
  const qIn=document.getElementById(`mq-${itemId}`);
  const uSp=document.getElementById(`mu-${itemId}`);
  const pSp=document.getElementById(`mp-${itemId}`);
  const m=getMaster(sel.value);
  if(m){
    uSp.textContent=m.unit;
    qIn.oninput=()=>{
      const qty=parseFloat(qIn.value)||0;
      const cost=qty*cpu(m);
      pSp.textContent=cost>0?`= £${cost.toFixed(3)}`:'';
    };
  } else {
    uSp.textContent=''; pSp.textContent='';
  }
}

function onQtyIn(itemId){
  const sel=document.getElementById(`ms-${itemId}`);
  const qIn=document.getElementById(`mq-${itemId}`);
  const pSp=document.getElementById(`mp-${itemId}`);
  const m=getMaster(sel.value);
  if(m){
    const qty=parseFloat(qIn.value)||0;
    const cost=qty*cpu(m);
    pSp.textContent=cost>0?`= £${cost.toFixed(3)}`:'';
  }
}

function addFromMaster(itemId,gpType){
  const mid=document.getElementById(`ms-${itemId}`).value;
  const qty=parseFloat(document.getElementById(`mq-${itemId}`).value);
  if(!mid){alert('Please select an ingredient from the master.');return;}
  if(isNaN(qty)||qty<=0){alert('Please enter a quantity greater than 0.');return;}
  const item=getGP(gpType).find(i=>i.id===itemId);
  if(item){
    item.recipe.push({mid,qty});
    expandedId=itemId; expandedType=gpType;
    render();
  }
}

function addCustom(itemId,gpType){
  const n=(document.getElementById(`cn-${itemId}`).value||'').trim();
  const c=parseFloat(document.getElementById(`cc-${itemId}`).value);
  if(!n){alert('Please enter an ingredient name.');return;}
  if(isNaN(c)){alert('Please enter a cost (£).');return;}
  const item=getGP(gpType).find(i=>i.id===itemId);
  if(item){
    item.recipe.push({mid:null,n,c});
    expandedId=itemId; expandedType=gpType;
    render();
  }
}

function addItem(gpType){
  const name=(document.getElementById(`nn-${gpType}`).value||'').trim();
  const cat=document.getElementById(`nc-${gpType}`).value;
  const sell=parseFloat(document.getElementById(`np-${gpType}`).value);
  if(!name||isNaN(sell)||sell<=0){alert('Enter a name and sell price.');return;}
  if(gpType==='wet') WET_GP.push({id:nextWet++,name,cat,sell,recipe:[]});
  else DRY_GP.push({id:nextDry++,name,cat,sell,recipe:[]});
  render();
}

/* ════════════════════════════════════════════
   MAIN RENDER
   ════════════════════════════════════════════ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') }

function setTab(t){
  activeTab=t;
  expandedId=null;
  expandedType=null;
  mFilter='';
  render();
}

function render(){
  const labels={
    drink:'Drink Ingredients Master',
    food:'Food Ingredients Master',
    ops:'Ops & Miscellaneous',
    wet:'Wet GP — Drinks Menu',
    dry:'Dry GP — Food Menu'
  };
  const subs={
    drink:'Purchase prices from Booker & Grape Minds · 03/04/26 · Edit any row to update prices — all linked GP recipes auto-recalculate instantly',
    food:'Prices from Arthur David & Carnevale · 03/04/26 · Compound items (green badge) are house-made batch preparations',
    ops:'Packaging, cleaning, PPE & operational consumables · Update costs as new invoices arrive',
    wet:'Click any item to expand its recipe · Select from master to link ingredients — cost auto-calculates from purchase price',
    dry:'Quantities from Medley Dry Cost Pricing 2025 PDF · Live prices from 03/04/26 invoices · May menu items included'
  };

  let html=`<div class="tab-header">
    <div class="tab-title">${labels[activeTab]}</div>
    <div class="tab-sub">${subs[activeTab]}</div>
  </div>`;

  if(activeTab==='drink') html+=renderMaster('D');
  else if(activeTab==='food') html+=renderMaster('F');
  else if(activeTab==='ops') html+=renderMaster('O');
  else if(activeTab==='wet') html+=renderGP('wet');
  else if(activeTab==='dry') html+=renderGP('dry');

  document.getElementById('content').innerHTML=html;

  document.querySelectorAll('.navtab').forEach(b=>b.classList.remove('active'));
  const at=document.getElementById('t-'+activeTab);
  if(at) at.classList.add('active');
}

/* ════════════════════════════════════════════
   PERSISTENCE — localStorage + JSON export/import
   ════════════════════════════════════════════ */

const STORAGE_KEY = 'medley-gp-v1';

// ── Set your shared password here ─────────────────────────────────────────
// All three of you (owner, GM, head chef) use this same password.
// To change it: update the line below, save the file, share the new version.
const ACCESS_PASSWORD = 'medley2025';
// ──────────────────────────────────────────────────────────────────────────

function saveState() {
  try {
    const state = {
      v: 1,
      savedAt: new Date().toISOString(),
      MASTERS, WET_GP, DRY_GP,
      nextIds, nextWet, nextDry, target
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    updateSaveStatus(state.savedAt);
  } catch(e) { console.warn('Save failed:', e); }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s || !s.MASTERS) return null;
    MASTERS  = s.MASTERS;
    WET_GP   = s.WET_GP;
    DRY_GP   = s.DRY_GP;
    nextIds  = s.nextIds  || nextIds;
    nextWet  = s.nextWet  || nextWet;
    nextDry  = s.nextDry  || nextDry;
    target   = s.target   || 70;
    return s.savedAt;
  } catch(e) { return null; }
}

function updateSaveStatus(isoStr) {
  const el = document.getElementById('save-status');
  if (!el || !isoStr) return;
  const d    = new Date(isoStr);
  const time = d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  const date = d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
  el.textContent = '💾 Saved ' + date + ' ' + time;
  el.className = 'save-status ok';
}

function exportData() {
  const state = {
    v: 1,
    exportedAt: new Date().toISOString(),
    MASTERS, WET_GP, DRY_GP,
    nextIds, nextWet, nextDry, target
  };
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'medley-gp-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const s = JSON.parse(e.target.result);
      if (!s || !s.MASTERS || !s.WET_GP) {
        alert('Invalid file — use a Medley GP export (.json) file.');
        return;
      }
      const exported = s.exportedAt
        ? new Date(s.exportedAt).toLocaleString('en-GB') : 'unknown time';
      if (!confirm(
        'Replace all current data with file exported ' + exported + '?\n\nYour current data will be overwritten. Continue?'
      )) { input.value=''; return; }
      MASTERS  = s.MASTERS;
      WET_GP   = s.WET_GP;
      DRY_GP   = s.DRY_GP;
      nextIds  = s.nextIds  || nextIds;
      nextWet  = s.nextWet  || nextWet;
      nextDry  = s.nextDry  || nextDry;
      target   = s.target   || 70;
      saveState();
      render();
      input.value = '';
      alert('✓ Data imported and saved.');
    } catch(err) { alert('Error reading file: ' + err.message); input.value=''; }
  };
  reader.readAsText(file);
}

/* ════════════════════════════════════════════
   AUTHENTICATION
   ════════════════════════════════════════════ */

function checkAuth() {
  return sessionStorage.getItem('medley-authed') === '1';
}

function attemptLogin() {
  const pwd = (document.getElementById('pwd-input').value || '').trim();
  if (pwd === ACCESS_PASSWORD) {
    sessionStorage.setItem('medley-authed', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('login-error').style.display  = 'none';
    const savedAt = loadState();
    if (savedAt) updateSaveStatus(savedAt);
    else { /* first ever open — default data already loaded */ }
    render();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

/* ── Auto-save wrapper — called after every data mutation ─────── */
function withSave(fn) {
  return function(...args) { fn(...args); saveState(); };
}

saveMaster    = withSave(saveMaster);
delMaster     = withSave(delMaster);
addMaster     = withSave(addMaster);
setSell       = withSave(setSell);
setQty        = withSave(setQty);
setCost       = withSave(setCost);
delIng        = withSave(delIng);
delItem       = withSave(delItem);
addFromMaster = withSave(addFromMaster);
addCustom     = withSave(addCustom);
addItem       = withSave(addItem);

/* ════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════ */

function init() {
  if (checkAuth()) {
    // Returning within same browser session (e.g. refresh)
    document.getElementById('login-screen').style.display = 'none';
    const savedAt = loadState();
    if (savedAt) updateSaveStatus(savedAt);
    render();
  } else {
    // New session — show login
    document.getElementById('login-screen').style.display = 'flex';
  }
}

init();
</script>
