<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>The Medley — Staff Portal</title>
<style>
:root{--teal:#1a6b5a;--teal-d:#134f43;--teal-l:#e8f4f1;--orange:#e8571a;--orange-l:#fdf0ea;--bg:#f5f7f6;--white:#ffffff;--border:#dde5e2;--text:#1a2620;--muted:#7a8f89;--good:#1a6b5a;--good-bg:#e8f4f1;--warn:#8a5200;--warn-bg:#fef3e2;--bad:#a32d2d;--bad-bg:#fdeaea;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
#login-screen{position:fixed;inset:0;background:var(--teal);z-index:9000;display:flex;flex-direction:column;align-items:center;overflow-y:auto}
.login-header{text-align:center;padding:32px 20px 20px;color:#fff}
.login-logo{font-size:28px;font-weight:900;letter-spacing:.06em}
.login-tagline{font-size:13px;opacity:.7;margin-top:4px}
.login-instruction{font-size:13px;opacity:.8;margin-top:16px}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;padding:16px;width:100%;max-width:600px}
.staff-card{background:rgba(255,255,255,.12);border:2px solid transparent;border-radius:var(--radius);padding:16px 8px;text-align:center;cursor:pointer;transition:.15s;color:#fff}
.staff-card:hover,.staff-card.selected{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5)}
.staff-avatar{width:60px;height:60px;border-radius:50%;margin:0 auto 10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;overflow:hidden}
.staff-avatar img{width:100%;height:100%;object-fit:cover}
.staff-card-name{font-size:13px;font-weight:600;line-height:1.3}
.staff-card-role{font-size:10px;opacity:.7;margin-top:2px}
#pin-screen{display:none;position:fixed;inset:0;background:var(--teal);z-index:9100;flex-direction:column;align-items:center;justify-content:center}
.pin-who{color:#fff;font-size:16px;font-weight:700;margin-bottom:8px}
.pin-dots{display:flex;gap:12px;margin-bottom:28px}
.pin-dot{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.3);transition:.15s}
.pin-dot.filled{background:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px}
.pin-btn{height:64px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:24px;font-weight:600;transition:.15s}
.pin-btn:active{background:rgba(255,255,255,.3);transform:scale(.95)}
.pin-btn.action{font-size:14px}
.pin-error{color:#ffb3b3;font-size:13px;margin-top:12px;text-align:center;min-height:18px}
.pin-back{color:rgba(255,255,255,.7);font-size:13px;margin-top:20px;text-decoration:underline;cursor:pointer;background:none;border:none}
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--teal);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{font-weight:900;font-size:15px;letter-spacing:.04em}
.topbar-user{display:flex;align-items:center;gap:8px}
.topbar-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;overflow:hidden}
.topbar-avatar img{width:100%;height:100%;object-fit:cover}
.topbar-name{font-size:13px;font-weight:600}
.topbar-role{font-size:10px;opacity:.7}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600}
nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 12px;position:sticky;top:52px;z-index:99}
nav::-webkit-scrollbar{display:none}
.navtab{border:none;background:none;padding:11px 14px;font-size:13px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;cursor:pointer;transition:.15s}
.navtab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:700}
#content{padding:16px;max-width:1100px;margin:0 auto;width:100%}
.card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.card-title{font-size:13px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:600px){.metric-grid{grid-template-columns:repeat(4,1fr)}}
.metric{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center}
.metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
.metric-value{font-size:26px;font-weight:900;color:var(--teal);margin:4px 0}
.metric-sub{font-size:11px;color:var(--muted)}
.clock-section{text-align:center;padding:24px 16px}
.clock-display{font-size:42px;font-weight:900;color:var(--teal);letter-spacing:.05em;font-variant-numeric:tabular-nums}
.clock-date{color:var(--muted);font-size:13px;margin-bottom:24px}
.clock-btn{display:inline-block;width:160px;height:160px;border-radius:50%;border:none;font-size:20px;font-weight:800;cursor:pointer;transition:.2s;box-shadow:0 6px 24px rgba(0,0,0,.15)}
.clock-btn.in{background:var(--teal);color:#fff}
.clock-btn.out{background:var(--orange);color:#fff}
.clock-btn.out:active{background:#c44414;transform:scale(.97)}
.clock-status{margin-top:20px;font-size:14px;color:var(--muted)}
.clock-timer{font-size:18px;font-weight:700;color:var(--orange)}
.break-select{width:100%;height:40px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--border);text-align:left;white-space:nowrap}
.data-table th.r,.data-table td.r{text-align:right}
.data-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tbody tr:hover{background:var(--teal-l)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.badge.super{background:#f0ebfb;color:#5b3c99}
.badge.manager{background:var(--warn-bg);color:var(--warn)}
.badge.staff{background:var(--teal-l);color:var(--teal)}
.badge.ok{background:var(--good-bg);color:var(--good)}
.badge.pending{background:var(--warn-bg);color:var(--warn)}
.badge.bad{background:var(--bad-bg);color:var(--bad)}
.form-grid{display:grid;gap:12px}
@media(min-width:500px){.form-grid.cols2{grid-template-columns:1fr 1fr}}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--teal)}
.form-group textarea{height:80px;resize:vertical}
.btn-teal{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700}
.btn-teal:hover{background:var(--teal-d)}
.btn-sm{border:1px solid var(--border);background:#fff;border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text)}
.btn-danger{background:var(--bad);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;transition:.2s}
.del-btn{border:none;background:none;color:#ccc;font-size:16px;cursor:pointer}
.del-btn:hover{color:var(--bad)}
.rota-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.rota-nav button{background:#fff;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:14px}
.rota-week-label{font-size:14px;font-weight:700;color:var(--teal)}
.rota-table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
.rota-wrap{overflow-x:auto}
.rota-table th{background:var(--teal);color:#fff;padding:8px;font-size:11px;font-weight:700;text-align:center}
.rota-table th:first-child{text-align:left;padding-left:10px}
.rota-table td{border:1px solid var(--border);padding:4px;vertical-align:top;min-width:80px;cursor:pointer}
.rota-table td:first-child{background:#f9fbfa;font-weight:600;font-size:12px;cursor:default;min-width:120px;padding:6px 10px}
.rota-table td:hover:not(:first-child){background:var(--teal-l)}
.rota-shift{background:var(--teal);color:#fff;border-radius:4px;padding:3px 6px;font-size:11px;margin:2px;display:flex;justify-content:space-between;align-items:center}
.rota-shift .del{background:none;border:none;color:rgba(255,255,255,.7);font-size:12px;padding:0;margin-left:4px;cursor:pointer}
.rota-empty{color:#ccc;font-size:10px;text-align:center;padding:8px 0}
.rota-add-form{background:var(--teal-l);border-radius:10px;padding:14px;margin-top:10px}
.profile-avatar-wrap{text-align:center;margin-bottom:20px}
.profile-avatar{width:100px;height:100px;border-radius:50%;border:4px solid var(--teal-l);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--teal);background:var(--teal-l);margin:0 auto 10px;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.avatar-upload{display:inline-block;background:var(--teal-l);color:var(--teal);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.avatar-upload input{display:none}
.pay-card{background:var(--teal);color:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px}
.pay-card-period{font-size:12px;opacity:.8}
.pay-card-amount{font-size:32px;font-weight:900;margin:4px 0}
.pay-card-detail{font-size:12px;opacity:.8}
.tips-badge{background:rgba(255,255,255,.2);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;display:inline-block;margin-top:6px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.alert.ok{background:var(--good-bg);color:var(--good)}
.alert.err{background:var(--bad-bg);color:var(--bad)}
.two-col{display:grid;gap:14px}
@media(min-width:700px){.two-col{grid-template-columns:1fr 1fr}}
/* Toast — iframe-safe */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99999;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:340px;width:90%;text-align:center;animation:toastIn .2s ease}
.toast.ok{background:var(--teal)}.toast.err{background:var(--bad)}.toast.warn{background:var(--warn)}
@keyframes toastIn{from{opacity:0;top:0}to{opacity:1;top:16px}}
/* Two-tap delete button states */
.btn-danger.confirming{background:#7f1d1d;animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:.8}to{opacity:1}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-header">
    <div class="login-logo">THE MEDLEY</div>
    <div class="login-tagline">Staff Portal · Season 2026</div>
    <div class="login-instruction">Tap your name to sign in</div>
  </div>
  <div class="staff-grid" id="staff-grid"><div class="loading">Loading staff…</div></div>
</div>

<div id="pin-screen">
  <div class="pin-who" id="pin-who"></div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div>
    <div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinKey('1')">1</button>
    <button class="pin-btn" onclick="pinKey('2')">2</button>
    <button class="pin-btn" onclick="pinKey('3')">3</button>
    <button class="pin-btn" onclick="pinKey('4')">4</button>
    <button class="pin-btn" onclick="pinKey('5')">5</button>
    <button class="pin-btn" onclick="pinKey('6')">6</button>
    <button class="pin-btn" onclick="pinKey('7')">7</button>
    <button class="pin-btn" onclick="pinKey('8')">8</button>
    <button class="pin-btn" onclick="pinKey('9')">9</button>
    <button class="pin-btn action" onclick="pinClear()">⌫</button>
    <button class="pin-btn" onclick="pinKey('0')">0</button>
    <button class="pin-btn action" onclick="pinSubmit()">✓</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <button class="pin-back" onclick="showLogin()">← Back to staff list</button>
</div>

<div id="app" style="display:flex">
  <div class="topbar">
    <div class="topbar-brand">THE MEDLEY</div>
    <div class="topbar-user">
      <div class="topbar-avatar" id="tb-avatar"></div>
      <div>
        <div class="topbar-name" id="tb-name"></div>
        <div class="topbar-role" id="tb-role"></div>
      </div>
      <button class="logout-btn" onclick="logout()">🚪 Sign out</button>
    </div>
  </div>
  <nav id="app-nav"></nav>
  <div id="content"><div class="loading">Loading…</div></div>
</div>

<script>
/* ── SUPABASE ── */
const SB = {
  url: 'https://aborbveavyyuqfevnjwh.supabase.co',
  key: 'sb_publishable_lXU329EeGST_bzwJVZqOQw_Uo-7ofqA',
  jwt: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFib3JidmVhdnl5dXFmZXZuandoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjg2MzMsImV4cCI6MjA5MDgwNDYzM30.kf-dkJko3WCcubIeIT-sa2UOss-_Ol_77amDw9u4CqI'
};
function hdr(key,write=false){
  const h={'apikey':key,'Authorization':'Bearer '+key};
  if(write){h['Content-Type']='application/json';h['Prefer']='return=representation';}
  return h;
}
async function sbFetch(method,table,opts={}){
  const {query='',data}=opts;
  const url=`${SB.url}/rest/v1/${table}${query?'?'+query:''}`;
  for(const key of [SB.jwt,SB.key]){
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),10000);
    try{
      const r=await fetch(url,{method,headers:hdr(key,method!=='GET'&&method!=='DELETE'),signal:ctrl.signal,body:data?JSON.stringify(data):undefined});
      clearTimeout(t);
      if(r.status===401||r.status===403)continue;
      if(!r.ok){const tx=await r.text();throw new Error(`${r.status}: ${tx.slice(0,200)}`);}
      const tx=await r.text();return tx?JSON.parse(tx):null;
    }catch(e){
      clearTimeout(t);
      if(e.name==='AbortError')throw new Error('Request timed out');
      if(e.message.match(/^\d{3}:/))throw e;
      if(key===SB.key)throw new Error('Network error: '+e.message);
    }
  }
}
async function dbGet(t,q=''){return sbFetch('GET',t,{query:q});}
async function dbPost(t,d){return sbFetch('POST',t,{data:d});}
async function dbPatch(t,id,d){return sbFetch('PATCH',t,{query:'id=eq.'+id,data:d});}
async function dbDel(t,id){return sbFetch('DELETE',t,{query:'id=eq.'+id});}

/* ── TOAST (iframe-safe, no alert/confirm) ── */
function showToast(msg,type='err'){
  document.querySelectorAll('.toast').forEach(x=>x.remove());
  const el=document.createElement('div');
  el.className='toast '+type;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

/* ── TWO-TAP DELETE (iframe-safe, replaces confirm()) ──
   First tap: button turns red, shows "Tap again to confirm"
   Second tap within 3s: executes delete
   Usage: twoTapDelete(btn, async () => { ... delete logic ... })
*/
function twoTapDelete(btn, action){
  if(btn._confirming){
    clearTimeout(btn._confirmTimer);
    btn._confirming=false;
    btn.textContent='🗑️';
    btn.classList.remove('confirming');
    action();
    return;
  }
  btn._confirming=true;
  btn.classList.add('confirming');
  btn.textContent='Sure? Tap again';
  btn._confirmTimer=setTimeout(()=>{
    btn._confirming=false;
    btn.classList.remove('confirming');
    btn.textContent='🗑️';
  },3000);
}

/* ── STATE ── */
let ME=null,ALL_STAFF=[],activeTab='',pinEntry='',pinTarget=null,clockTimer=null,rotaWeekOffset=0,refreshInterval=null,editingShiftId=null,rotaAddTarget=null;
let _posting=false;
const ROLES={super_admin:'Super Admin',manager:'Manager',staff:'Staff'};
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const SESSION_KEY='medley-staff-v3';
const SESSION_MS=15*60*1000;
let lastActivity=Date.now(),inactivityTimer=null;

function isSuperAdmin(){return ME&&ME.role==='super_admin';}
function isManager(){return ME&&(ME.role==='manager'||ME.role==='super_admin');}

function avatarHtml(p,size=40){
  if(p&&p.avatar_url)return`<img src="${p.avatar_url}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover">`;
  const i=(p?p.name:'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return`<span style="font-size:${Math.round(size*.4)}px;font-weight:800">${i}</span>`;
}

/* ── SESSION ── */
function saveSession(){if(ME)localStorage.setItem(SESSION_KEY,JSON.stringify({staff:ME,at:Date.now()}));}
function loadSession(){
  try{
    const r=localStorage.getItem(SESSION_KEY);
    if(!r)return null;
    const {staff,at}=JSON.parse(r);
    if(!staff||Date.now()-at>SESSION_MS){localStorage.removeItem(SESSION_KEY);return null;}
    return staff;
  }catch(e){return null;}
}
function clearSession(){localStorage.removeItem(SESSION_KEY);}
function resetInactivity(){lastActivity=Date.now();if(ME)saveSession();}
function startInactivityWatch(){
  ['click','touchstart','keydown','scroll'].forEach(ev=>document.addEventListener(ev,resetInactivity,{passive:true}));
  inactivityTimer=setInterval(()=>{
    if(ME&&Date.now()-lastActivity>SESSION_MS){showToast('Signed out due to inactivity');logout();}
  },60000);
}

/* ── AUTH ── */
async function loadStaffList(){
  const grid=document.getElementById('staff-grid');
  grid.innerHTML='<div style="color:rgba(255,255,255,.6);text-align:center;width:100%;padding:20px">Connecting…</div>';
  try{
    ALL_STAFF=await dbGet('staff','is_active=eq.true&order=name.asc');
    renderStaffGrid();
  }catch(e){
    grid.innerHTML=`<div style="color:#fff;text-align:center;width:90%;padding:20px;max-width:400px;margin:0 auto">
      <div style="font-size:18px;margin-bottom:8px">⚠️</div>
      <div style="font-weight:700;margin-bottom:6px">Connection failed</div>
      <div style="background:rgba(0,0,0,.25);border-radius:8px;padding:10px;font-size:11px;word-break:break-all;margin-bottom:12px;font-family:monospace">${e.message}</div>
      <button onclick="loadStaffList()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:8px 20px;cursor:pointer">↻ Retry</button>
    </div>`;
  }
}
function renderStaffGrid(){
  const grid=document.getElementById('staff-grid');
  if(!ALL_STAFF.length){grid.innerHTML='<div style="color:rgba(255,255,255,.7);text-align:center;width:100%;padding:20px">No staff yet.</div>';return;}
  grid.innerHTML=ALL_STAFF.map(s=>`
    <div class="staff-card" onclick="selectStaff('${s.id}')">
      <div class="staff-avatar">${s.avatar_url?`<img src="${s.avatar_url}">`:(s.name.split(' ').map(w=>w[0]).join('').slice(0,2))}</div>
      <div class="staff-card-name">${s.name}</div>
      <div class="staff-card-role">${ROLES[s.role]||s.role}</div>
    </div>`).join('');
}
function selectStaff(id){
  pinTarget=ALL_STAFF.find(s=>s.id===id);
  pinEntry='';
  document.getElementById('pin-who').textContent=`Hi ${pinTarget.name.split(' ')[0]} 👋`;
  updatePinDots();
  document.getElementById('pin-error').textContent='';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
}
function showLogin(){
  pinTarget=null;pinEntry='';
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}
function pinKey(d){if(pinEntry.length>=4)return;pinEntry+=d;updatePinDots();if(pinEntry.length===4)setTimeout(pinSubmit,100);}
function pinClear(){pinEntry=pinEntry.slice(0,-1);updatePinDots();}
function updatePinDots(){document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<pinEntry.length));}
async function pinSubmit(){
  if(!pinTarget||pinEntry.length!==4)return;
  if(pinEntry===pinTarget.pin_hash){
    ME=pinTarget;saveSession();
    document.getElementById('pin-screen').style.display='none';
    launchApp();

/* ── Rota match check — runs when date or time changes ── */
async function checkRotaMatch(){
  const date=document.getElementById('clock-in-date')?.value;
  const time=document.getElementById('clock-in-time')?.value;
  const hint=document.getElementById('notes-hint');
  const msg=document.getElementById('rota-match-msg');
  const notesInput=document.getElementById('clock-in-notes');
  if(!date||!time||!hint||!msg)return;

  // Check rota for this staff member on this date
  try{
    const rota=await dbGet('rota',`staff_id=eq.${ME.id}&date=eq.${date}`);
    if(!rota||!rota.length){
      // No rota entry — note required if not today's current time
      const isToday=date===new Date().toISOString().slice(0,10);
      const diffMins=(Date.now()-new Date(`${date}T${time}:00`))/60000;
      if(isToday&&diffMins<15){
        hint.textContent='(optional)';hint.style.color='var(--muted)';
        msg.innerHTML='';
        notesInput.required=false;
      }else{
        hint.textContent='(required — no rota found for this date)';hint.style.color='var(--warn)';
        msg.innerHTML=`<span style="color:var(--warn)">⚠️ No rota shift found for ${fmtDateShort(date)} — please add a note explaining your hours.</span>`;
        notesInput.required=true;
      }
      return;
    }
    // Has rota — check if entered time matches within 15 mins
    const rotaStart=rota[0].start_time.slice(0,5); // HH:MM
    const [rh,rm]=rotaStart.split(':').map(Number);
    const [th,tm]=time.split(':').map(Number);
    const diffWithRota=Math.abs((th*60+tm)-(rh*60+rm));
    if(diffWithRota<=15){
      hint.textContent='(optional — matches your rota ✓)';hint.style.color='var(--good)';
      msg.innerHTML=`<span style="color:var(--good)">✓ Matches your rota start time of ${rotaStart}</span>`;
      notesInput.required=false;
    }else{
      hint.textContent=`(required — rota shows ${rotaStart})`;hint.style.color='var(--warn)';
      msg.innerHTML=`<span style="color:var(--warn)">⚠️ Your rota start is ${rotaStart} — please add a note if your time differs.</span>`;
      notesInput.required=true;
    }
  }catch(e){
    // Silently fail — don't block clock in on rota check error
    hint.textContent='(optional)';hint.style.color='var(--muted)';
  }
}

async function doClockOut(shiftId,dateStr){
  const tv=(document.getElementById('clock-out-time')?.value||'').trim();
  const brk=parseInt(document.getElementById('break-select')?.value||'0')||0;
  const btn=document.getElementById('clock-out-btn');
  if(!tv){showToast('Please enter your finish time.');return;}
  if(btn){btn.textContent='Saving…';btn.disabled=true;btn.style.opacity='.7';}
  try{
    const clockOut=new Date(`${dateStr}T${tv}:00`);
    let clockIn=new Date(`${dateStr}T09:00:00`);
    try{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),6000);
      const r=await fetch(`${SB.url}/rest/v1/shifts?id=eq.${shiftId}&select=clock_in`,{headers:{'apikey':SB.jwt,'Authorization':'Bearer '+SB.jwt},signal:ctrl.signal});
      clearTimeout(t);
      if(r.ok){const d=await r.json();if(d[0]?.clock_in)clockIn=new Date(d[0].clock_in);}
    }catch(fe){}
    const totalHours=Math.max(0,((clockOut-clockIn)/60000-brk)/60);
    await dbPatch('shifts',shiftId,{clock_out:clockOut.toISOString(),break_minutes:brk,total_hours:totalHours.toFixed(2),status:'pending_approval'});
    document.getElementById('content').innerHTML=`
      <div class="card" style="text-align:center;padding:48px 24px;max-width:500px;margin:0 auto">

        <div style="font-size:15px;color:var(--muted);margin-bottom:24px">

        <div style="background:var(--teal-l);border-radius:10px;padding:14px;font-size:13px;color:var(--teal);margin-bottom:24px">

    if(btn){btn.innerHTML='CLOCK<br>OUT';btn.disabled=false;btn.style.opacity='1';}
  }
}

}

/* ── ROTA ── */
function getWeekDates(offset=0){
  const now=new Date(),day=now.getDay(),monday=new Date(now);
  monday.setDate(now.getDate()-(day===0?6:day-1)+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d.toISOString().slice(0,10);});
}
async function renderRota(){
  const dates=getWeekDates(rotaWeekOffset);
  const weekLabel=`${fmtDateShort(dates[0])} – ${fmtDateShort(dates[6])}`;
  const rota=await dbGet('rota',`date=gte.${dates[0]}&date=lte.${dates[6]}&order=start_time.asc`);
  const staffToShow=isManager()?ALL_STAFF:ALL_STAFF.filter(s=>s.id===ME.id);
  let h=`<div class="rota-nav">
    <button onclick="rotaWeekOffset--;setTab('rota')">← Prev</button>
    <div class="rota-week-label">Week of ${weekLabel}</div>
    <button onclick="rotaWeekOffset++;setTab('rota')">Next →</button>
    ${rotaWeekOffset!==0?`<button onclick="rotaWeekOffset=0;setTab('rota')" style="margin-left:auto">Today</button>`:''}
  </div>
  <div class="rota-wrap"><table class="rota-table">
    <thead><tr><th>Staff</th>${dates.map((d,i)=>`<th>${DAYS[i]}<br><small>${d.slice(8)}</small></th>`).join('')}</tr></thead>
    <tbody>`;
  staffToShow.forEach(st=>{
    h+=`<tr><td>${st.name.split(' ')[0]}</td>`;
    dates.forEach(date=>{
      const dayShifts=rota.filter(r=>r.staff_id===st.id&&r.date===date);
      h+=`<td ${isManager()?`onclick="showRotaAdd('${st.id}','${date}')"`:''}">`;
      dayShifts.forEach(r=>{
        h+=`<div class="rota-shift"><span>${r.start_time.slice(0,5)}–${r.end_time.slice(0,5)}</span>
          ${isManager()?`<button class="del" onclick="delRota('${r.id}',event)">×</button>`:''}
        </div>`;
      });
      if(!dayShifts.length&&isManager())h+=`<div class="rota-empty">+ Add</div>`;
      h+=`</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  if(isManager())h+=`<div id="rota-add-form"></div>`;
  return h;
}
function showRotaAdd(staffId,date){

async function addRota(staffId,date){

function deleteShift(btn,id){
  twoTapDelete(btn,async()=>{
    showToast('Deleting…','ok');
    try{
      const r=await fetch(`${SB.url}/rest/v1/shifts?id=eq.${id}`,{method:'DELETE',headers:{'apikey':SB.jwt,'Authorization':'Bearer '+SB.jwt,'Prefer':'return=minimal'}});
      if(!r.ok){const tx=await r.text();throw new Error(`${r.status}: ${tx.slice(0,150)}`);}
      if(editingShiftId===id)editingShiftId=null;
      showToast('Shift deleted ✓','ok');
      setTimeout(()=>setTab('timesheets'),600);
    }catch(e){showToast('Delete failed: '+e.message);}
  });
}
async function approveShift(id){
  try{
    const shift=(await dbGet('shifts',`id=eq.${id}`))[0];
    let u={status:'completed',adjusted_by:ME.id};
    if(shift.clock_in&&shift.clock_out){
      const mins=(new Date(shift.clock_out)-new Date(shift.clock_in))/60000-(shift.break_minutes||0);
      u.total_hours=Math.max(0,mins/60).toFixed(2);
    }
    await dbPatch('shifts',id,u);
    showToast('Approved ✓','ok');
    setTimeout(()=>setTab('timesheets'),600);
  }catch(e){showToast('Error: '+e.message);}
}
function previewHrs(){
  const i=document.getElementById('es-in'),o=document.getElementById('es-out'),b=document.getElementById('es-break'),p=document.getElementById('es-prev');
  if(!i||!o||!p)return;
  const [sh,sm]=(i.value||'00:00').split(':').map(Number);
  const [eh,em]=(o.value||'00:00').split(':').map(Number);
  const brk=parseInt(b?.value||0);
  p.textContent=Math.max(0,((eh*60+em)-(sh*60+sm)-brk)/60).toFixed(2);
}
async function saveEdit(shiftId,staffId,approve=false){
  const date=document.getElementById('es-date').value;
  const inT=document.getElementById('es-in').value;
  const outT=document.getElementById('es-out').value;
  const brk=parseInt(document.getElementById('es-break').value)||0;
  const notes=document.getElementById('es-notes').value.trim();
  if(!date||!inT){showToast('Date and start time required.');return;}
  const ci=new Date(`${date}T${inT}:00`).toISOString();
  const co=outT?new Date(`${date}T${outT}:00`).toISOString():null;
  const mins=co?(new Date(co)-new Date(ci))/60000-brk:0;
  try{
    await dbPatch('shifts',shiftId,{clock_in:ci,clock_out:co,break_minutes:brk,total_hours:Math.max(0,mins/60).toFixed(2),adjusted_by:ME.id,notes:notes||null,status:approve?'completed':'pending_approval'});
    editingShiftId=null;showToast('Saved ✓','ok');setTimeout(()=>setTab('timesheets'),600);
  }catch(e){showToast('Error: '+e.message);}
}

async function renderPayPeriods(){
  const periods=await dbGet('pay_periods','order=start_date.desc');
  let h='';
  if(isSuperAdmin()){
    h+=`<div class="card"><div class="card-title">Create Pay Period</div>
      <div class="form-grid cols2">
        <div class="form-group"><label>Start</label><input type="date" id="pp-start"></div>
        <div class="form-group"><label>End</label><input type="date" id="pp-end"></div>
      </div>
      <button class="btn-teal" onclick="createPayPeriod()" style="margin-top:10px">Create Period</button></div>`;
  }
  if(!periods.length){h+=`<div class="empty"><div class="empty-icon">💰</div>No pay periods yet</div>`;return h;}
  for(const p of periods){
    const shifts=await dbGet('shifts',`clock_in=gte.${p.start_date}T00:00:00Z&clock_in=lte.${p.end_date}T23:59:59Z&status=eq.completed`);
    const staffWorked=new Set(shifts.map(s=>s.staff_id));
    const tipShare=staffWorked.size>0?(parseFloat(p.tips_total)||0)/staffWorked.size:0;
    let totalPay=0;
    shifts.forEach(s=>{const st=ALL_STAFF.find(m=>m.id===s.staff_id);totalPay+=(parseFloat(s.total_hours)||0)*(st?st.hourly_rate:0);});
    const myS=shifts.filter(s=>s.staff_id===ME.id);
    const myH=myS.reduce((t,s)=>t+(parseFloat(s.total_hours)||0),0);
    const myP=myH*(ME.hourly_rate||0),myT=staffWorked.has(ME.id)?tipShare:0;
    h+=`<div class="pay-card">
      <div class="pay-card-period">${fmtDateShort(p.start_date)} – ${fmtDateShort(p.end_date)}</div>
      <div class="pay-card-amount">£${(myP+myT).toFixed(2)}</div>
      <div class="pay-card-detail">${myH.toFixed(1)}h × £${parseFloat(ME.hourly_rate||0).toFixed(2)}/hr = £${myP.toFixed(2)}</div>
      ${myT>0?`<div class="tips-badge">+ £${myT.toFixed(2)} tips</div>`:''}
    </div>`;
    if(isManager()){
      h+=`<div class="card" style="margin-top:-8px;border-radius:0 0 var(--radius) var(--radius)">
        <div style="font-size:13px;margin-bottom:10px">Total wages: <strong>£${totalPay.toFixed(2)}</strong> · Tips pot: 
          ${isSuperAdmin()?`£<input type="number" step="0.01" value="${p.tips_total||0}" style="width:80px;border:1px solid var(--border);border-radius:5px;padding:3px 6px" onchange="updateTips('${p.id}',+this.value)">`:`<strong>£${parseFloat(p.tips_total||0).toFixed(2)}</strong>`}
          split ${staffWorked.size} ways = £${tipShare.toFixed(2)} each
        </div>
        <table class="data-table" style="font-size:12px"><thead><tr><th>Staff</th><th class="r">Hrs</th><th class="r">Wages</th><th class="r">Tips</th><th class="r">Total</th></tr></thead><tbody>`;
      ALL_STAFF.forEach(st=>{
        const sts=shifts.filter(s=>s.staff_id===st.id);if(!sts.length)return;
        const hrs=sts.reduce((t,s)=>t+(parseFloat(s.total_hours)||0),0);
        const wages=hrs*(st.hourly_rate||0),tips=staffWorked.has(st.id)?tipShare:0;
        h+=`<tr><td>${st.name}</td><td class="r">${hrs.toFixed(1)}</td><td class="r">£${wages.toFixed(2)}</td><td class="r">£${tips.toFixed(2)}</td><td class="r"><strong>£${(wages+tips).toFixed(2)}</strong></td></tr>`;
      });
      h+=`</tbody></table></div>`;
    }
  }
  return h;
}
async function createPayPeriod(){
  const s=document.getElementById('pp-start').value,e=document.getElementById('pp-end').value;
  if(!s||!e){showToast('Please set start and end dates.');return;}
  if(e<s){showToast('End must be after start.');return;}
  try{await dbPost('pay_periods',{start_date:s,end_date:e,tips_total:0,status:'open'});setTab('pay');}
  catch(e){showToast('Error: '+e.message);}
}
async function updateTips(id,val){try{await dbPatch('pay_periods',id,{tips_total:val});}catch(e){showToast('Error: '+e.message);}}

    <div class="card-title">My Profile</div>
    <div class="profile-avatar-wrap">
      <div class="profile-avatar" id="profile-avatar-preview">${ME.avatar_url?`<img src="${ME.avatar_url}">`:(ME.name.split(' ').map(w=>w[0]).join('').slice(0,2))}</div>
      <label class="avatar-upload">📷 Change photo<input type="file" accept="image/*" onchange="uploadAvatar(this)"></label>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Full Name</label><input id="p-name" value="${ME.name}"></div>
      <div class="form-group"><label>Email</label><input type="email" id="p-email" value="${ME.email||''}"></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="p-phone" value="${ME.phone||''}"></div>
      <div class="form-group"><label>Address</label><input id="p-address" value="${ME.address||''}"></div>
    </div>
    <button class="btn-teal" onclick="saveProfile()" style="margin-top:12px">Save Profile</button>
    <hr class="divider">
    <div class="card-title">Change PIN</div>
    <div class="form-grid cols2">
      <div class="form-group"><label>New PIN (4 digits)</label><input type="password" id="new-pin" maxlength="4" placeholder="••••"></div>
      <div class="form-group"><label>Confirm PIN</label><input type="password" id="confirm-pin" maxlength="4" placeholder="••••"></div>
    </div>
    <button class="btn-teal" onclick="changePIN()" style="margin-top:10px">Update PIN</button>
    <div id="profile-msg" style="margin-top:10px"></div>
    <hr class="divider">
    <div style="font-size:13px;color:var(--muted)">
      <div>Hourly rate: <strong>£${parseFloat(ME.hourly_rate||0).toFixed(2)}/hr</strong></div>
      <div style="margin-top:4px">Role: <strong>${ROLES[ME.role]||ME.role}</strong></div>
    </div>
  </div>`;
}
async function uploadAvatar(input){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){showToast('Photo must be under 5MB');return;}
  const preview=document.getElementById('profile-avatar-preview');
  if(preview)preview.innerHTML=`<div style="font-size:12px;color:var(--muted)">Uploading…</div>`;
  showToast('Uploading…','ok');
  try{
    const ext=file.name.split('.').pop().toLowerCase()||'jpg';
    const path=`${ME.id}.${ext}`;
    // Try both keys — newer Supabase projects use publishable key for storage
    let uploaded=false;
    for(const key of [SB.key, SB.jwt]){
      const r=await fetch(`${SB.url}/storage/v1/object/profile-pics/${path}`,{
        method:'PUT',
        headers:{'apikey':key,'Authorization':'Bearer '+key,'Content-Type':file.type||'image/jpeg','x-upsert':'true'},
        body:file
      });
      if(r.ok){uploaded=true;break;}
      if(key===SB.key){
        // First key failed, log and try second
        const tx=await r.text();
        console.warn('Key 1 failed:',r.status,tx.slice(0,100));
      } else {
        const tx=await r.text();
        throw new Error(`Upload ${r.status}: ${tx.slice(0,120)}`);
      }
    }
    if(!uploaded)throw new Error('Both keys failed for upload');
    const url=`${SB.url}/storage/v1/object/public/profile-pics/${path}?t=${Date.now()}`;
    await dbPatch('staff',ME.id,{avatar_url:url});
    ME.avatar_url=url;saveSession();
    document.getElementById('tb-avatar').innerHTML=avatarHtml(ME,30);
    if(preview)preview.innerHTML=`<img src="${url}" style="width:100px;height:100px;border-radius:50%;object-fit:cover">`;
    const idx=ALL_STAFF.findIndex(s=>s.id===ME.id);if(idx>=0)ALL_STAFF[idx].avatar_url=url;
    showToast('Photo updated ✓','ok');input.value='';
  }catch(e){showToast('Upload error: '+e.message);if(preview)preview.innerHTML=avatarHtml(ME,100);}
}
async function saveProfile(){
  const name=document.getElementById('p-name').value.trim();
  const email=document.getElementById('p-email').value.trim();
  const phone=document.getElementById('p-phone').value.trim();
  const address=document.getElementById('p-address').value.trim();
  if(!name){showToast('Name cannot be empty.');return;}
  try{
    await dbPatch('staff',ME.id,{name,email,phone,address});
    ME={...ME,name,email,phone,address};saveSession();
    document.getElementById('tb-name').textContent=ME.name.split(' ')[0];
    const idx=ALL_STAFF.findIndex(s=>s.id===ME.id);if(idx>=0)ALL_STAFF[idx]={...ALL_STAFF[idx],name,email,phone,address};
    showMsg('profile-msg','Profile saved!','ok');
  }catch(e){showMsg('profile-msg','Error: '+e.message,'err');}
}
async function changePIN(){
  const np=document.getElementById('new-pin').value,cp=document.getElementById('confirm-pin').value;
  if(!/^\d{4}$/.test(np)){showMsg('profile-msg','PIN must be 4 digits.','err');return;}
  if(np!==cp){showMsg('profile-msg','PINs do not match.','err');return;}
  if(np==='0000'){showMsg('profile-msg','Choose a different PIN — 0000 is the default.','err');return;}
  try{await dbPatch('staff',ME.id,{pin_hash:np});ME.pin_hash=np;saveSession();showMsg('profile-msg','✓ PIN updated!','ok');document.getElementById('new-pin').value='';document.getElementById('confirm-pin').value='';}
  catch(e){showMsg('profile-msg','Error: '+e.message,'err');}
}

/* ── STAFF ADMIN ── */
async function renderStaffAdmin(){
  let h=`<div class="card"><div class="card-title">Add New Staff Member</div>
    <div class="form-grid cols2">
      <div class="form-group"><label>Full Name *</label><input id="ns-name" placeholder="First Last"></div>
      <div class="form-group"><label>Role</label><select id="ns-role"><option value="staff">Staff</option><option value="manager">Manager</option><option value="super_admin">Super Admin</option></select></div>
      <div class="form-group"><label>Email</label><input type="email" id="ns-email"></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="ns-phone"></div>
      <div class="form-group"><label>Hourly Rate £</label><input type="number" step="0.01" id="ns-rate" placeholder="12.21"></div>
    </div>
    <button class="btn-teal" onclick="addStaff()" style="margin-top:10px">Add Staff Member</button>
    <div id="add-staff-msg" style="margin-top:8px"></div></div>
  <div class="card"><div class="card-title">All Staff (${ALL_STAFF.length})</div>
    <table class="data-table"><thead><tr><th>Name</th><th>Role</th><th>Email</th><th class="r">Rate</th><th>PIN</th><th>Active</th><th></th></tr></thead><tbody>`;
  ALL_STAFF.forEach(st=>{
    h+=`<tr>
      <td><strong>${st.name}</strong></td>
      <td><span class="badge ${st.role}">${ROLES[st.role]||st.role}</span></td>
      <td style="font-size:12px;color:var(--muted)">${st.email||'—'}</td>
      <td class="r">£<input type="number" step="0.01" value="${parseFloat(st.hourly_rate||0).toFixed(2)}" style="width:65px;text-align:right;border:1px solid var(--border);border-radius:4px;padding:2px 5px" onchange="updateRate('${st.id}',+this.value)"></td>
      <td>${st.id===ME.id?'—':`<button class="btn-sm" onclick="resetPIN('${st.id}','${st.name.replace(/'/g,'&#39;')}')">Reset</button>`}</td>
      <td><label style="cursor:pointer"><input type="checkbox" ${st.is_active?'checked':''} onchange="toggleActive('${st.id}',this.checked)"> ${st.is_active?'Active':'Inactive'}</label></td>
      <td>${st.id!==ME.id?`<button class="del-btn" onclick="removeStaff('${st.id}','${st.name.replace(/'/g,'&#39;')}')">✕</button>`:''}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;return h;
}
async function addStaff(){
  const name=document.getElementById('ns-name').value.trim();
  const role=document.getElementById('ns-role').value;
  const email=document.getElementById('ns-email').value.trim();
  const phone=document.getElementById('ns-phone').value.trim();
  const rate=parseFloat(document.getElementById('ns-rate').value)||0;
  if(!name){showMsg('add-staff-msg','Name is required.','err');return;}
  try{
    const result=await dbPost('staff',{name,role,email,phone,hourly_rate:rate,pin_hash:'0000',is_active:true});
    const newStaff=Array.isArray(result)?result[0]:result;
    if(newStaff){ALL_STAFF.push(newStaff);ALL_STAFF.sort((a,b)=>a.name.localeCompare(b.name));}
    showMsg('add-staff-msg',`✓ ${name} added. Default PIN is 0000.`,'ok');
    ['ns-name','ns-email','ns-phone','ns-rate'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    setTimeout(()=>setTab('staff-admin'),800);
  }catch(e){showMsg('add-staff-msg','Error: '+e.message,'err');}
}
async function updateRate(id,val){try{await dbPatch('staff',id,{hourly_rate:val});const st=ALL_STAFF.find(s=>s.id===id);if(st)st.hourly_rate=val;}catch(e){showToast('Error: '+e.message);}}
async function resetPIN(id,name){
  try{await dbPatch('staff',id,{pin_hash:'0000'});showToast(`${name}'s PIN reset to 0000`,'ok');}
  catch(e){showToast('Error: '+e.message);}
}
async function toggleActive(id,active){
  try{await dbPatch('staff',id,{is_active:active});const st=ALL_STAFF.find(s=>s.id===id);if(st)st.is_active=active;}
  catch(e){showToast('Error: '+e.message);}
}
async function removeStaff(id,name){
  try{await dbPatch('staff',id,{is_active:false});ALL_STAFF=ALL_STAFF.filter(s=>s.id!==id);setTab('staff-admin');}
  catch(e){showToast('Error: '+e.message);}
}

/* ── UTILS ── */
function fmtHHMM(d){return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function fmtTime(iso){if(!iso)return'—';return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function fmtDateShort(str){if(!str)return'—';return new Date(str+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function fmtElapsed(from){const mins=Math.floor((Date.now()-from)/60000),h=Math.floor(mins/60),m=mins%60;return h>0?`${h}h ${m}m`:`${m}m`;}
function showMsg(id,msg,type){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="alert ${type}">${msg}</div>`;}

/* ── INIT ── */
async function init(){
  const saved=loadSession();
  if(saved){
    try{
      ALL_STAFF=await dbGet('staff','is_active=eq.true&order=name.asc');
      const fresh=ALL_STAFF.find(s=>s.id===saved.id);
      ME=fresh||saved;saveSession();
      document.getElementById('login-screen').style.display='none';
      launchApp();return;
    }catch(e){ME=saved;ALL_STAFF=[saved];document.getElementById('login-screen').style.display='none';launchApp();return;}
  }
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  loadStaffList();
}
init();
</script>
