<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>The Medley — Staff Portal</title>
<style>
:root{--teal:#1a6b5a;--teal-d:#134f43;--teal-l:#e8f4f1;--orange:#e8571a;--orange-l:#fdf0ea;--bg:#f5f7f6;--white:#ffffff;--border:#dde5e2;--text:#1a2620;--muted:#7a8f89;--good:#1a6b5a;--good-bg:#e8f4f1;--warn:#8a5200;--warn-bg:#fef3e2;--bad:#a32d2d;--bad-bg:#fdeaea;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;overflow-x:hidden;max-width:100vw}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
#login-screen{position:fixed;inset:0;background:var(--teal);z-index:9000;display:flex;flex-direction:column;align-items:center;overflow-y:auto}
.login-header{text-align:center;padding:32px 20px 20px;color:#fff}
.login-logo{font-size:28px;font-weight:900;letter-spacing:.06em}
.login-tagline{font-size:13px;opacity:.7;margin-top:4px}
.login-instruction{font-size:13px;opacity:.8;margin-top:16px}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;padding:16px;width:100%;max-width:600px}
.staff-card{background:rgba(255,255,255,.12);border:2px solid transparent;border-radius:var(--radius);padding:16px 8px;text-align:center;cursor:pointer;transition:.15s;color:#fff}
.staff-card:hover,.staff-card.selected{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5)}
.staff-avatar{width:60px;height:60px;border-radius:50%;margin:0 auto 10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;overflow:hidden}
.staff-avatar img{width:100%;height:100%;object-fit:cover}
.staff-card-name{font-size:13px;font-weight:600;line-height:1.3}
.staff-card-role{font-size:10px;opacity:.7;margin-top:2px}
#pin-screen{display:none;position:fixed;inset:0;background:var(--teal);z-index:9100;flex-direction:column;align-items:center;justify-content:center}
.pin-who{color:#fff;font-size:16px;font-weight:700;margin-bottom:8px}
.pin-dots{display:flex;gap:12px;margin-bottom:28px}
.pin-dot{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.3);transition:.15s}
.pin-dot.filled{background:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px}
.pin-btn{height:64px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:24px;font-weight:600;transition:.15s}
.pin-btn:active{background:rgba(255,255,255,.3);transform:scale(.95)}
.pin-btn.action{font-size:14px}
.pin-error{color:#ffb3b3;font-size:13px;margin-top:12px;text-align:center;min-height:18px}
.pin-back{color:rgba(255,255,255,.7);font-size:13px;margin-top:20px;text-decoration:underline;cursor:pointer;background:none;border:none}
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--teal);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{font-weight:900;font-size:15px;letter-spacing:.04em}
.topbar-user{display:flex;align-items:center;gap:8px}
.topbar-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;overflow:hidden}
.topbar-avatar img{width:100%;height:100%;object-fit:cover}
.topbar-name{font-size:13px;font-weight:600}
.topbar-role{font-size:10px;opacity:.7}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600}
nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 12px;position:sticky;top:52px;z-index:99}
nav::-webkit-scrollbar{display:none}
.navtab{border:none;background:none;padding:11px 14px;font-size:13px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;cursor:pointer;transition:.15s}
.navtab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:700}
#content{padding:16px;max-width:1100px;margin:0 auto;width:100%;overflow-x:hidden}

/* ── Scrollable table container (internal scroll, not page scroll) ── */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;border-radius:4px}
.tbl-scroll::-webkit-scrollbar{height:3px}
.tbl-scroll::-webkit-scrollbar-thumb{background:var(--teal);border-radius:2px}

/* ── Mobile-hidden columns ── */
@media(max-width:600px){
  .m-hide{display:none!important}
  #content{padding:8px}
  .card{padding:12px}
  .data-table{font-size:12px}
  .data-table th{padding:5px 5px;font-size:9px}
  .data-table td{padding:6px 5px}
  .metric-value{font-size:20px}
  .clock-display{font-size:32px}
  .clock-btn{width:130px;height:130px;font-size:17px}
}
.card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.card-title{font-size:13px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:600px){.metric-grid{grid-template-columns:repeat(4,1fr)}}
.metric{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center}
.metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
.metric-value{font-size:26px;font-weight:900;color:var(--teal);margin:4px 0}
.metric-sub{font-size:11px;color:var(--muted)}
.clock-section{text-align:center;padding:24px 16px}
.clock-display{font-size:42px;font-weight:900;color:var(--teal);letter-spacing:.05em;font-variant-numeric:tabular-nums}
.clock-date{color:var(--muted);font-size:13px;margin-bottom:24px}
.clock-btn{display:inline-block;width:160px;height:160px;border-radius:50%;border:none;font-size:20px;font-weight:800;cursor:pointer;transition:.2s;box-shadow:0 6px 24px rgba(0,0,0,.15)}
.clock-btn.in{background:var(--teal);color:#fff}
.clock-btn.out{background:var(--orange);color:#fff}
.clock-btn.out:active{background:#c44414;transform:scale(.97)}
.clock-status{margin-top:20px;font-size:14px;color:var(--muted)}
.clock-timer{font-size:18px;font-weight:700;color:var(--orange)}
.break-select{width:100%;height:40px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--border);text-align:left;white-space:nowrap}
.data-table th.r,.data-table td.r{text-align:right}
.data-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tbody tr:hover{background:var(--teal-l)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.badge.super{background:#f0ebfb;color:#5b3c99}
.badge.manager{background:var(--warn-bg);color:var(--warn)}
.badge.staff{background:var(--teal-l);color:var(--teal)}
.badge.ok{background:var(--good-bg);color:var(--good)}
.badge.pending{background:var(--warn-bg);color:var(--warn)}
.badge.bad{background:var(--bad-bg);color:var(--bad)}
.form-grid{display:grid;gap:12px}
@media(min-width:500px){.form-grid.cols2{grid-template-columns:1fr 1fr}}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--teal)}
.form-group textarea{height:80px;resize:vertical}
.btn-teal{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700}
.btn-teal:hover{background:var(--teal-d)}
.btn-sm{border:1px solid var(--border);background:#fff;border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text)}
.btn-danger{background:var(--bad);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;transition:.2s}
.del-btn{border:none;background:none;color:#ccc;font-size:16px;cursor:pointer}
.del-btn:hover{color:var(--bad)}
.rota-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.rota-nav button{background:#fff;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
.rota-week-label{font-size:14px;font-weight:700;color:var(--teal)}
.rota-table{width:100%;border-collapse:collapse;font-size:12px;min-width:560px}
.rota-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid var(--border)}
.rota-wrap::-webkit-scrollbar{height:4px}
.rota-wrap::-webkit-scrollbar-track{background:#f0f0f0}
.rota-wrap::-webkit-scrollbar-thumb{background:var(--teal);border-radius:2px}
.rota-table th{background:var(--teal);color:#fff;padding:8px;font-size:11px;font-weight:700;text-align:center}
.rota-table th:first-child{text-align:left;padding-left:10px}
.rota-table td{border:1px solid var(--border);padding:4px;vertical-align:top;min-width:80px;cursor:pointer}
.rota-table td:first-child{background:#f9fbfa;font-weight:600;font-size:12px;cursor:default;min-width:120px;padding:6px 10px}
.rota-table td:hover:not(:first-child){background:var(--teal-l)}
.rota-shift{background:var(--teal);color:#fff;border-radius:4px;padding:3px 6px;font-size:11px;margin:2px;display:flex;justify-content:space-between;align-items:center;touch-action:pan-y;user-select:none;-webkit-user-select:none}
.rota-shift .del{background:none;border:none;color:rgba(255,255,255,.7);font-size:12px;padding:0;margin-left:4px;cursor:pointer}
.rota-empty{color:#ccc;font-size:10px;text-align:center;padding:8px 0}
.rota-add-form{background:var(--teal-l);border-radius:10px;padding:14px;margin-top:10px}
.profile-avatar-wrap{text-align:center;margin-bottom:20px}
.profile-avatar{width:100px;height:100px;border-radius:50%;border:4px solid var(--teal-l);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--teal);background:var(--teal-l);margin:0 auto 10px;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.avatar-upload{display:inline-block;background:var(--teal-l);color:var(--teal);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.avatar-upload input{display:none}
.pay-card{background:var(--teal);color:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px}
.pay-card-period{font-size:12px;opacity:.8}
.pay-card-amount{font-size:32px;font-weight:900;margin:4px 0}
.pay-card-detail{font-size:12px;opacity:.8}
.tips-badge{background:rgba(255,255,255,.2);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;display:inline-block;margin-top:6px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.alert.ok{background:var(--good-bg);color:var(--good)}
.alert.err{background:var(--bad-bg);color:var(--bad)}
.two-col{display:grid;gap:14px}
@media(min-width:700px){.two-col{grid-template-columns:1fr 1fr}}

/* ── Toast ── */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99999;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:340px;width:90%;text-align:center;animation:toastIn .2s ease}
.toast.ok{background:var(--teal)}.toast.err{background:var(--bad)}.toast.warn{background:var(--warn)}
@keyframes toastIn{from{opacity:0;top:0}to{opacity:1;top:16px}}
.btn-danger.confirming{background:#7f1d1d;animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:.8}to{opacity:1}}

/* ── Touch drag-and-drop rota ── */
/* Source shift dims when dragging starts */
.rota-shift.touch-drag-source{opacity:0.3;outline:2px dashed rgba(255,255,255,.5)}
/* Ghost element that follows the finger */
.rota-ghost{
  position:fixed;
  pointer-events:none;
  z-index:99999;
  display:flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  font-weight:700;
  color:#fff;
  box-shadow:0 12px 32px rgba(0,0,0,.35);
  transform:scale(1.1) rotate(-2deg);
  transition:none;
  white-space:nowrap;
  min-width:90px;
  justify-content:center;
}
/* Drop target cell highlight */
.rota-drop-active{
  background:var(--teal-l) !important;
  outline:2px dashed var(--teal) !important;
  outline-offset:-2px;
  transition:background .1s;
}
/* Mobile-only hint bar */
.rota-drag-hint{
  display:none;
  font-size:11px;
  color:var(--muted);
  text-align:center;
  padding:8px 12px;
  background:#f0f7f5;
  border-radius:8px;
  margin-bottom:10px;
  border:1px solid var(--border);
}
@media(max-width:700px){
  .rota-drag-hint{display:block}
  /* Make shift chips slightly taller on mobile for easier touch */
  .rota-shift{padding:5px 6px;font-size:12px;min-height:28px}
  .rota-table td{min-width:72px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-header">
    <div class="login-logo">THE MEDLEY</div>
    <div class="login-tagline">Staff Portal · Season 2026</div>
    <div class="login-instruction">Tap your name to sign in</div>
  </div>
  <div class="staff-grid" id="staff-grid"><div class="loading">Loading staff…</div></div>
</div>

<div id="pin-screen">
  <div class="pin-who" id="pin-who"></div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div>
    <div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinKey('1')">1</button>
    <button class="pin-btn" onclick="pinKey('2')">2</button>
    <button class="pin-btn" onclick="pinKey('3')">3</button>
    <button class="pin-btn" onclick="pinKey('4')">4</button>
    <button class="pin-btn" onclick="pinKey('5')">5</button>
    <button class="pin-btn" onclick="pinKey('6')">6</button>
    <button class="pin-btn" onclick="pinKey('7')">7</button>
    <button class="pin-btn" onclick="pinKey('8')">8</button>
    <button class="pin-btn" onclick="pinKey('9')">9</button>
    <button class="pin-btn action" onclick="pinClear()">⌫</button>
    <button class="pin-btn" onclick="pinKey('0')">0</button>
    <button class="pin-btn action" onclick="pinSubmit()">✓</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <button class="pin-back" onclick="showLogin()">← Back to staff list</button>
</div>

<div id="app" style="display:flex">
  <div class="topbar">
    <div class="topbar-brand">THE MEDLEY</div>
    <div class="topbar-user">
      <div class="topbar-avatar" id="tb-avatar"></div>
      <div>
        <div class="topbar-name" id="tb-name"></div>
        <div class="topbar-role" id="tb-role"></div>
      </div>
      <button class="logout-btn" onclick="logout()">🚪 Sign out</button>
    </div>
  </div>
  <nav id="app-nav"></nav>
  <div id="content"><div class="loading">Loading…</div></div>
</div>

<script>
/* ── SUPABASE ── */
const SB = {
  url: 'https://aborbveavyyuqfevnjwh.supabase.co',
  key: 'sb_publishable_lXU329EeGST_bzwJVZqOQw_Uo-7ofqA',
  jwt: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFib3JidmVhdnl5dXFmZXZuandoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjg2MzMsImV4cCI6MjA5MDgwNDYzM30.kf-dkJko3WCcubIeIT-sa2UOss-_Ol_77amDw9u4CqI'
};
function hdr(key,write=false){
  const h={'apikey':key,'Authorization':'Bearer '+key};
  if(write){h['Content-Type']='application/json';h['Prefer']='return=representation';}
  return h;
}
async function sbFetch(method,table,opts={}){
  const {query='',data}=opts;
  const url=`${SB.url}/rest/v1/${table}${query?'?'+query:''}`;
  for(const key of [SB.jwt,SB.key]){
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),10000);
    try{
      const r=await fetch(url,{method,headers:hdr(key,method!=='GET'&&method!=='DELETE'),signal:ctrl.signal,body:data?JSON.stringify(data):undefined});
      clearTimeout(t);
      if(r.status===401||r.status===403)continue;
      if(!r.ok){const tx=await r.text();throw new Error(`${r.status}: ${tx.slice(0,200)}`);}
      const tx=await r.text();return tx?JSON.parse(tx):null;
    }catch(e){
      clearTimeout(t);
      if(e.name==='AbortError')throw new Error('Request timed out');
      if(e.message.match(/^\d{3}:/))throw e;
      if(key===SB.key)throw new Error('Network error: '+e.message);
    }
  }
}
async function dbGet(t,q=''){return sbFetch('GET',t,{query:q});}
async function dbPost(t,d){return sbFetch('POST',t,{data:d});}
async function dbPatch(t,id,d){return sbFetch('PATCH',t,{query:'id=eq.'+id,data:d});}
async function dbDel(t,id){return sbFetch('DELETE',t,{query:'id=eq.'+id});}

/* ── GP ACCESS SETTINGS (stored in medley_settings table) ── */
async function loadGPSettings(){
  try{
    const rows=await dbGet('medley_settings','key=in.(gp_password,gp_access_ids,gp_sync_code)');
    (rows||[]).forEach(r=>{
      if(r.key==='gp_password'&&r.value)GP_SETTINGS.password=r.value;
      if(r.key==='gp_sync_code'&&r.value)GP_SETTINGS.syncCode=r.value;
      if(r.key==='gp_access_ids'){try{GP_SETTINGS.accessIds=JSON.parse(r.value);}catch(e){}}
    });
  }catch(e){/* use defaults — medley_settings may be empty on first run */}
}
async function saveAppData(key,value){
  // Use PostgREST upsert — requires key to have a unique/primary constraint
  const url=`${SB.url}/rest/v1/medley_settings`;
  let lastErr=null;
  for(const authKey of [SB.jwt,SB.key]){
    try{
      const r=await fetch(url,{
        method:'POST',
        headers:{
          'apikey':authKey,
          'Authorization':'Bearer '+authKey,
          'Content-Type':'application/json',
          'Prefer':'resolution=merge-duplicates,return=minimal'
        },
        body:JSON.stringify({key,value})
      });
      if(r.status===401||r.status===403){lastErr=new Error(`Auth error (${r.status})`);continue;}
      if(r.ok)return true;
      // Upsert failed — try explicit PATCH as fallback
      const patchR=await fetch(`${url}?key=eq.${encodeURIComponent(key)}`,{
        method:'PATCH',
        headers:{
          'apikey':authKey,
          'Authorization':'Bearer '+authKey,
          'Content-Type':'application/json',
          'Prefer':'return=minimal'
        },
        body:JSON.stringify({value})
      });
      if(patchR.ok)return true;
      const tx=await r.text();
      lastErr=new Error(`${r.status}: ${tx.slice(0,180)}`);
    }catch(e){
      lastErr=e;
      if(authKey===SB.key)throw lastErr;
    }
  }
  throw lastErr||new Error('Save failed — check medley_settings table in Supabase');
}
async function toggleGPAccess(staffId,grant){
  const chk=document.getElementById(`gp-chk-${staffId}`);
  const lbl=document.getElementById(`gp-lbl-${staffId}`);
  // Optimistic UI update
  if(lbl){lbl.textContent=grant?'Saving…':'Saving…';lbl.style.color='var(--muted)';}
  if(chk)chk.disabled=true;
  try{
    let ids=[...GP_SETTINGS.accessIds];
    if(grant){if(!ids.includes(staffId))ids.push(staffId);}
    else{ids=ids.filter(id=>id!==staffId);}
    await saveAppData('gp_access_ids',JSON.stringify(ids));
    GP_SETTINGS.accessIds=ids; // only update memory AFTER confirmed save
    if(lbl){lbl.textContent=grant?'Granted':'No access';lbl.style.color=grant?'var(--teal)':'var(--muted)';lbl.style.fontWeight=grant?'700':'400';}
    showToast(grant?`GP access granted ✓`:`GP access removed`,'ok');
  }catch(e){
    // Revert checkbox on failure
    if(chk){chk.checked=!grant;chk.disabled=false;}

    showToast('Save failed: '+e.message);
  }finally{
    if(chk)chk.disabled=false;
  }
}

/* ── TOAST ── */
function showToast(msg,type='err'){
  document.querySelectorAll('.toast').forEach(x=>x.remove());
  const el=document.createElement('div');
  el.className='toast '+type;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

/* ── TWO-TAP DELETE ── */
function twoTapDelete(btn,action){
  if(btn._confirming){
    clearTimeout(btn._confirmTimer);
    btn._confirming=false;
    btn.textContent='🗑️';
    btn.classList.remove('confirming');
    action();
    return;
  }
  btn._confirming=true;
  btn.classList.add('confirming');
  btn.textContent='Sure? Tap again';
  btn._confirmTimer=setTimeout(()=>{
    btn._confirming=false;
    btn.classList.remove('confirming');
    btn.textContent='🗑️';
  },3000);
}

function startClockTimer(){clearInterval(clockTimer);clockTimer=setInterval(()=>{const el=document.getElementById('live-clock');if(el)el.textContent=fmtHHMM(new Date());},1000);}
async function checkRotaMatch(){
  const date=document.getElementById('clock-in-date')?.value;
  const time=document.getElementById('clock-in-time')?.value;
  const hint=document.getElementById('notes-hint');
  const msg=document.getElementById('rota-match-msg');
  const notesInput=document.getElementById('clock-in-notes');
  if(!date||!time||!hint||!msg)return;
  try{
    const rota=await dbGet('rota',`staff_id=eq.${ME.id}&date=eq.${date}`);
    if(!rota||!rota.length){
      const isToday=date===localDate();
      const diffMins=(Date.now()-new Date(`${date}T${time}:00`))/60000;
      if(isToday&&diffMins<15){
        hint.textContent='(optional)';hint.style.color='var(--muted)';
        msg.innerHTML='';notesInput.required=false;
      }else{
        hint.textContent='(required — no rota found for this date)';hint.style.color='var(--warn)';
        msg.innerHTML=`<span style="color:var(--warn)">⚠️ No rota shift found for ${fmtDateShort(date)} — please add a note explaining your hours.</span>`;
        notesInput.required=true;
      }
      return;
    }
    const rotaStart=rota[0].start_time.slice(0,5);
    const [rh,rm]=rotaStart.split(':').map(Number);
    const [th,tm]=time.split(':').map(Number);
    const diffWithRota=Math.abs((th*60+tm)-(rh*60+rm));
    if(diffWithRota<=15){
      hint.textContent='(optional — matches your rota ✓)';hint.style.color='var(--good)';
      msg.innerHTML=`<span style="color:var(--good)">✓ Matches your rota start time of ${rotaStart}</span>`;
      notesInput.required=false;
    }else{
      hint.textContent=`(required — rota shows ${rotaStart})`;hint.style.color='var(--warn)';
      msg.innerHTML=`<span style="color:var(--warn)">⚠️ Your rota start is ${rotaStart} — please add a note if your time differs.</span>`;
      notesInput.required=true;
    }
  }catch(e){hint.textContent='(optional)';hint.style.color='var(--muted)';}
}
async function doClockIn(){
  const date=document.getElementById('clock-in-date')?.value||localDate();
  const tv=(document.getElementById('clock-in-time')?.value||'').trim();
  const notes=(document.getElementById('clock-in-notes')?.value||'').trim();
  const notesRequired=document.getElementById('clock-in-notes')?.required;
  const btn=document.getElementById('clock-in-btn');
  if(!tv){showToast('Please enter your start time.');return;}
  const today=localDate();
  const entered=new Date(`${date}T${tv}:00`);
  const now=new Date();
  if(date>today){showToast("You can't clock in to a future shift — please check the date.");return;}
  if(date===today&&entered.getTime()-now.getTime()>5*60*1000){showToast("That start time is in the future. Enter your actual start time.");document.getElementById('clock-in-time')?.focus();return;}
  if(notesRequired&&!notes){showToast('Please add a note explaining your hours for this shift.');document.getElementById('clock-in-notes')?.focus();return;}
  if(btn){btn.textContent='Saving…';btn.disabled=true;btn.style.opacity='.7';}
  try{
    await dbPost('shifts',{staff_id:ME.id,clock_in:entered.toISOString(),status:'pending_approval',notes:notes||null});
    const isToday=date===localDate();
    document.getElementById('content').innerHTML=`
      <div class="card" style="text-align:center;padding:48px 24px;max-width:500px;margin:0 auto">
        <div style="font-size:64px;margin-bottom:16px">${isToday?'🟢':'📋'}</div>
        <div style="font-size:24px;font-weight:900;color:var(--teal);margin-bottom:8px">${isToday?"You're Clocked In!":'Shift Logged!'}</div>
        <div style="font-size:15px;color:var(--muted);margin-bottom:24px">
          ${isToday?'Started at':'Shift logged for'} <strong>${isToday?tv:fmtDateShort(date)+' at '+tv}</strong><br>
          ${notes?`Note: <em>${notes}</em><br>`:''}
          <span style="color:var(--warn);font-weight:600">Awaiting manager approval</span>
        </div>
        ${isToday?`
          <div style="background:var(--teal-l);border-radius:10px;padding:14px;font-size:13px;color:var(--teal);margin-bottom:20px">Remember to clock out at the end of your shift.</div>
          <button class="btn-teal" style="font-size:15px;padding:12px 32px" onclick="setTab('clock')">Go to Clock Out →</button>
        `:`
          <div style="background:var(--teal-l);border-radius:10px;padding:14px;font-size:13px;color:var(--teal);margin-bottom:20px">If you've also finished this shift, go back and log your clock-out time too.</div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <button class="btn-teal" style="font-size:14px;padding:10px 20px" onclick="setTab('clock')">Log clock-out for this shift</button>
            <button class="btn-sm" style="font-size:14px;padding:10px 20px" onclick="setTab('clock')">Log another past shift</button>
          </div>
        `}
      </div>`;
  }catch(e){
    showToast('Clock in failed: '+e.message);
    if(btn){btn.innerHTML='CLOCK<br>IN';btn.disabled=false;btn.style.opacity='1';}
  }
}

async function doClockOut(shiftId,fallbackDateStr){
  const dateStr=(document.getElementById('clock-out-date')?.value||fallbackDateStr||localDate()).trim();
  const tv=(document.getElementById('clock-out-time')?.value||'').trim();
  const brk=parseInt(document.getElementById('break-select')?.value||'0')||0;
  const notes=(document.getElementById('clock-out-notes')?.value||'').trim();
  const btn=document.getElementById('clock-out-btn');
  const isToday=dateStr===localDate();
  if(!tv){showToast('Please enter your finish time.');return;}
  if(!isToday&&!notes){showToast('Please add a note — e.g. "Forgot to clock out"');document.getElementById('clock-out-notes')?.focus();return;}
  if(btn){btn.textContent='Saving…';btn.disabled=true;btn.style.opacity='.7';}
  try{
    const clockOut=new Date(`${dateStr}T${tv}:00`);
    let clockIn=new Date(`${dateStr}T09:00:00`);
    try{
      const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),6000);
      const r=await fetch(`${SB.url}/rest/v1/shifts?id=eq.${shiftId}&select=clock_in`,{headers:{'apikey':SB.jwt,'Authorization':'Bearer '+SB.jwt},signal:ctrl.signal});
      clearTimeout(t);if(r.ok){const d=await r.json();if(d[0]?.clock_in)clockIn=new Date(d[0].clock_in);}
    }catch(fe){}
    let adjustedOut=new Date(clockOut);
    if(adjustedOut<=clockIn)adjustedOut=new Date(adjustedOut.getTime()+86400000);
    const totalHours=Math.max(0,((adjustedOut-clockIn)/60000-brk)/60);
    await dbPatch('shifts',shiftId,{clock_out:clockOut.toISOString(),break_minutes:brk,total_hours:totalHours.toFixed(2),status:'pending_approval',notes:notes||null});
    document.getElementById('content').innerHTML=`
      <div class="card" style="text-align:center;padding:48px 24px;max-width:500px;margin:0 auto">
        <div style="font-size:64px;margin-bottom:16px">✅</div>
        <div style="font-size:24px;font-weight:900;color:var(--teal);margin-bottom:8px">Shift Complete!</div>
        <div style="font-size:15px;color:var(--muted);margin-bottom:24px">
          Clocked out at <strong>${tv}</strong><br>
          <strong>${totalHours.toFixed(2)} hours</strong> logged — awaiting manager approval
        </div>
        <div style="background:var(--teal-l);border-radius:10px;padding:14px;font-size:13px;color:var(--teal);margin-bottom:24px">Your hours appear in your timesheet once a manager confirms them.</div>
        <button class="btn-teal" style="font-size:15px;padding:12px 32px" onclick="setTab('clock')">${isToday?'Back to Home':'Log another shift →'}</button>
      </div>`;
  }catch(e){
    showToast('Clock out failed: '+e.message);
    if(btn){btn.innerHTML='CLOCK<br>OUT';btn.disabled=false;btn.style.opacity='1';}
  }
}

function getWeekDates(offset=0){
  const n=new Date();
  const todayStr=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  const today=new Date(todayStr+'T00:00:00');
  const dow=today.getDay();
  const daysSinceMonday=dow===0?6:dow-1;
  const monday=new Date(today);
  monday.setDate(today.getDate()-daysSinceMonday+(offset*7));
  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });
}

  }

  h+=`<div id="rota-export-area">`;
  h+=`<div style="background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">

async function duplicateLastWeek(){
  const lastDates=getWeekDates(rotaWeekOffset-1);
  const thisDates=getWeekDates(rotaWeekOffset);
  try{
    const lastRota=await dbGet('rota',`date=gte.${lastDates[0]}&date=lte.${lastDates[6]}`);
    if(!lastRota.length){showToast('No shifts found in last week to copy.','warn');return;}
    const thisRota=await dbGet('rota',`date=gte.${thisDates[0]}&date=lte.${thisDates[6]}`);
    if(thisRota.length>0){
      if(!duplicateLastWeek._confirmed){
        duplicateLastWeek._confirmed=true;
        showToast('This week already has shifts. Tap Copy again to add on top.','warn');
        setTimeout(()=>{duplicateLastWeek._confirmed=false;},4000);
        return;
      }
      duplicateLastWeek._confirmed=false;
    }
    let count=0;
    for(const shift of lastRota){
      const dayIdx=lastDates.indexOf(shift.date);if(dayIdx<0)continue;
      const newDate=thisDates[dayIdx];
      try{await dbPost('rota',{staff_id:shift.staff_id,date:newDate,start_time:shift.start_time,end_time:shift.end_time,created_by:ME.id});count++;}catch(e){}
    }
    showToast(`✓ Copied ${count} shifts from last week`,'ok');
    setTimeout(()=>setTab('rota'),700);
  }catch(e){showToast('Error copying rota: '+e.message);}
}

async function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}
async function exportRotaImage(){
  showToast('Generating full rota image…','ok');
  try{
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    const canvas=await captureFullRota();
    const a=document.createElement('a');
    const dates=getWeekDates(rotaWeekOffset);
    a.download=`medley-rota-${dates[0]}.png`;a.href=canvas.toDataURL('image/png');a.click();
    showToast('Image downloaded ✓','ok');
  }catch(e){showToast('Export failed: '+e.message);}
}
async function exportRotaPDF(){
  showToast('Generating full rota PDF…','ok');
  try{
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
    const canvas=await captureFullRota();
    const imgData=canvas.toDataURL('image/png');
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const pdfW=pdf.internal.pageSize.getWidth(),pdfH=pdf.internal.pageSize.getHeight();
    const ratio=canvas.width/canvas.height;
    let w=pdfW,h=pdfW/ratio;if(h>pdfH){h=pdfH;w=pdfH*ratio;}
    pdf.addImage(imgData,'PNG',(pdfW-w)/2,(pdfH-h)/2,w,h);
    const dates=getWeekDates(rotaWeekOffset);
    pdf.save(`medley-rota-${dates[0]}.pdf`);
    showToast('PDF downloaded ✓','ok');
  }catch(e){showToast('Export failed: '+e.message);}
}
async function captureFullRota(){
  const el=document.getElementById('rota-export-area');
  if(!el)throw new Error('Rota not found — please reload');
  const wrapper=document.createElement('div');
  wrapper.style.cssText='position:fixed;left:-9999px;top:0;width:1100px;background:#f5f7f6;padding:16px;z-index:-1;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
  const clone=el.cloneNode(true);
  clone.querySelectorAll('.rota-empty,.rota-shift .del,[onclick*="showRotaAdd"],[onclick*="delRota"]').forEach(b=>{
    if(b.classList.contains('rota-empty'))b.textContent='';else b.remove();
  });
  clone.querySelectorAll('.rota-wrap').forEach(w=>{w.style.overflow='visible';w.style.width='100%';});
  clone.querySelectorAll('.rota-table').forEach(t=>{t.style.minWidth='unset';t.style.width='100%';});
  wrapper.appendChild(clone);document.body.appendChild(wrapper);
  await new Promise(r=>setTimeout(r,100));
  const canvas=await html2canvas(wrapper,{backgroundColor:'#f5f7f6',scale:2,useCORS:true,scrollX:0,scrollY:0,width:1100,windowWidth:1200});
  document.body.removeChild(wrapper);return canvas;
}

/* ═══════════════════════════════════════════════════════
   TOUCH DRAG-AND-DROP FOR ROTA
   ═══════════════════════════════════════════════════════
   How it works:
   1. Manager long-presses a shift chip (250ms) → drag activates
   2. A ghost element clones the chip and follows the finger (position:fixed)
   3. elementFromPoint() finds the drop target cell under the finger
   4. On touchend → moveRotaShift() patches the rota DB record
   5. Haptic feedback via navigator.vibrate(50) when drag starts
   6. Scrolling still works normally if finger moves before 250ms timer fires
   ═══════════════════════════════════════════════════════ */

const TOUCH_DRAG_DELAY = 250; // ms long-press before drag activates

// Touch drag state — all in one object for easy cleanup
let _td = {
  active:       false,
  rotaId:       null,
  staffId:      null,
  date:         null,
  color:        null,
  label:        null,
  ghost:        null,
  sourceEl:     null,
  targetCell:   null,
  rotaWrap:     null,   // the rota-wrap container — scroll locked during drag
  timer:        null,
  startX:       0,
  startY:       0,
  _justDropped: false,
};

function initRotaTouchDrag() {
  // Attach listeners to every rota-shift chip in the current render
  document.querySelectorAll('.rota-shift[data-rota-id]').forEach(el => {
    el.addEventListener('touchstart', _onRotaTouchStart, { passive: false });
  });
}

function _onRotaTouchStart(e) {
  const el = e.currentTarget;
  const rotaId = el.dataset.rotaId;
  if (!rotaId || !isManager()) return;

  const touch = e.touches[0];
  _td.startX   = touch.clientX;
  _td.startY   = touch.clientY;
  _td.sourceEl = el;
  _td.rotaId   = rotaId;
  _td.staffId  = el.dataset.staffId;
  _td.date     = el.dataset.date;
  _td.color    = el.dataset.color || 'var(--teal)';
  _td.label    = el.querySelector('span')?.textContent || '';

  // Start long-press timer
  _td.timer = setTimeout(() => _activateRotaDrag(el, touch), TOUCH_DRAG_DELAY);

  document.addEventListener('touchmove',   _onRotaTouchMove,   { passive: false });
  document.addEventListener('touchend',    _onRotaTouchEnd,    { passive: false });
  document.addEventListener('touchcancel', _onRotaTouchCancel, { passive: false });
}

function _activateRotaDrag(el, touch) {
  _td.active = true;

  // Lock horizontal scroll on the rota-wrap during drag (restore on cleanup)
  const wrap = el.closest('.rota-wrap');
  if (wrap) { wrap.style.overflowX = 'hidden'; wrap.style.touchAction = 'none'; }
  _td.rotaWrap = wrap || null;
  // Disable all touch actions on the chip itself so drag move works
  el.style.touchAction = 'none';

  // Dim the source chip in place
  el.classList.add('touch-drag-source');

  // Build a ghost that looks like the chip but floats with the finger
  const rect = el.getBoundingClientRect();
  const ghost = document.createElement('div');
  ghost.className = 'rota-ghost';
  ghost.style.background = _td.color.startsWith('var') ? getComputedStyle(document.documentElement).getPropertyValue('--teal') : _td.color;
  ghost.textContent = _td.label;
  ghost.style.left  = (rect.left + rect.width  / 2 - 45) + 'px';
  ghost.style.top   = (rect.top  - 10) + 'px';
  ghost.style.width = Math.max(rect.width, 90) + 'px';
  document.body.appendChild(ghost);
  _td.ghost = ghost;

  // Haptic pulse on supported devices
  if (navigator.vibrate) navigator.vibrate(50);
}

function _onRotaTouchMove(e) {
  const touch = e.touches[0];

  // Before drag activates: cancel if finger has wandered (allow normal scroll)
  if (!_td.active) {
    const dx = Math.abs(touch.clientX - _td.startX);
    const dy = Math.abs(touch.clientY - _td.startY);
    if (dx > 10 || dy > 10) {
      clearTimeout(_td.timer);
      cleanupRotaDrag(false);
    }
    return;
  }

  // Drag is live — block page scroll
  e.preventDefault();

  const x = touch.clientX;
  const y = touch.clientY;

  // Move ghost to follow finger (centred horizontally, slightly above finger)
  if (_td.ghost) {
    const gw = parseFloat(_td.ghost.style.width) || 90;
    _td.ghost.style.left = (x - gw / 2) + 'px';
    _td.ghost.style.top  = (y - 36)     + 'px';
  }

  // Find drop target — hide ghost momentarily so it doesn't block elementFromPoint
  if (_td.ghost) _td.ghost.style.visibility = 'hidden';
  const elUnder = document.elementFromPoint(x, y);
  if (_td.ghost) _td.ghost.style.visibility = '';

  const cell = elUnder ? elUnder.closest('td[data-staff-id]') : null;

  // Clear previous highlight
  if (_td.targetCell && _td.targetCell !== cell) {
    _td.targetCell.classList.remove('rota-drop-active');
  }

  // Highlight new target — but skip if it's the exact same cell the shift is already in
  if (cell) {
    const sameStaff = cell.dataset.staffId === _td.staffId;
    const sameDate  = cell.dataset.date     === _td.date;
    if (!sameStaff || !sameDate) {
      cell.classList.add('rota-drop-active');
      _td.targetCell = cell;
    } else {
      _td.targetCell = null;
    }
  } else {
    _td.targetCell = null;
  }
}

function _onRotaTouchEnd(e) {
  clearTimeout(_td.timer);

  if (_td.active && _td.targetCell) {
    const newStaffId = _td.targetCell.dataset.staffId;
    const newDate    = _td.targetCell.dataset.date;

    // Only move if something actually changed
    if (newStaffId !== _td.staffId || newDate !== _td.date) {
      _td._justDropped = true;  // suppress the onclick that follows touchend
      moveRotaShift(_td.rotaId, newStaffId, newDate);
    }
  }

  cleanupRotaDrag(true);
}

function _onRotaTouchCancel() {
  clearTimeout(_td.timer);
  cleanupRotaDrag(false);
}

function cleanupRotaDrag(preserveJustDropped = false) {
  // Restore source chip appearance
  if (_td.sourceEl) {
    _td.sourceEl.classList.remove('touch-drag-source');
    _td.sourceEl.style.touchAction = '';
  }

  // Restore rota-wrap scroll
  if (_td.rotaWrap) {
    _td.rotaWrap.style.overflowX = '';
    _td.rotaWrap.style.touchAction = '';
  }

  // Remove ghost
  if (_td.ghost) { _td.ghost.remove(); }

  // Remove drop target highlight
  if (_td.targetCell) _td.targetCell.classList.remove('rota-drop-active');
  // Also sweep for any lingering highlights (safety net)
  document.querySelectorAll('.rota-drop-active').forEach(el => el.classList.remove('rota-drop-active'));

  // Detach document listeners
  document.removeEventListener('touchmove',   _onRotaTouchMove);
  document.removeEventListener('touchend',    _onRotaTouchEnd);
  document.removeEventListener('touchcancel', _onRotaTouchCancel);

  const wasDropped = _td._justDropped;

  // Reset state
  _td.active       = false;
  _td.rotaId       = null;
  _td.staffId      = null;
  _td.date         = null;
  _td.color        = null;
  _td.label        = null;
  _td.ghost        = null;
  _td.sourceEl     = null;
  _td.targetCell   = null;
  _td.rotaWrap     = null;
  _td.timer        = null;
  _td.startX       = 0;
  _td.startY       = 0;

  // Keep _justDropped alive just long enough to suppress the onclick
  _td._justDropped = preserveJustDropped && wasDropped;
  if (_td._justDropped) setTimeout(() => { _td._justDropped = false; }, 300);
}

async function moveRotaShift(rotaId, newStaffId, newDate) {
  try {
    await dbPatch('rota', rotaId, { staff_id: newStaffId, date: newDate });
    showToast('Shift moved ✓', 'ok');
    setTimeout(() => setTab('rota'), 350);
  } catch(e) {
    showToast('Move failed: ' + e.message);
    setTimeout(() => setTab('rota'), 500); // reload to restore correct state
  }
}

function deleteShift(btn,id){
  twoTapDelete(btn,async()=>{
    showToast('Deleting…','ok');
    try{
      const r=await fetch(`${SB.url}/rest/v1/shifts?id=eq.${id}`,{method:'DELETE',headers:{'apikey':SB.jwt,'Authorization':'Bearer '+SB.jwt,'Prefer':'return=minimal'}});
      if(!r.ok){const tx=await r.text();throw new Error(`${r.status}: ${tx.slice(0,150)}`);}
      if(editingShiftId===id)editingShiftId=null;
      showToast('Shift deleted ✓','ok');
      setTimeout(()=>setTab('timesheets'),600);
    }catch(e){showToast('Delete failed: '+e.message);}
  });
}
async function approveShift(id){
  try{
    const shift=(await dbGet('shifts',`id=eq.${id}`))[0];
    let u={status:'completed',adjusted_by:ME.id};
    if(shift.clock_in&&shift.clock_out){
      let co=new Date(shift.clock_out),ci=new Date(shift.clock_in);
      if(co<=ci)co=new Date(co.getTime()+86400000);
      const mins=(co-ci)/60000-(shift.break_minutes||0);
      u.total_hours=Math.max(0,mins/60).toFixed(2);
    }
    await dbPatch('shifts',id,u);
    showToast('Approved ✓','ok');setTimeout(()=>setTab('timesheets'),600);
  }catch(e){showToast('Error: '+e.message);}
}
function previewHrs(){
  const i=document.getElementById('es-in'),o=document.getElementById('es-out'),b=document.getElementById('es-break'),p=document.getElementById('es-prev');
  if(!i||!o||!p)return;
  const [sh,sm]=(i.value||'00:00').split(':').map(Number);
  const [eh,em]=(o.value||'00:00').split(':').map(Number);
  const brk=parseInt(b?.value||0);
  p.textContent=Math.max(0,((eh*60+em)-(sh*60+sm)-brk)/60).toFixed(2);
}
async function saveEdit(shiftId,staffId,approve=false){
  const date=document.getElementById('es-date').value;
  const inT=document.getElementById('es-in').value;
  const outT=document.getElementById('es-out').value;
  const brk=parseInt(document.getElementById('es-break').value)||0;
  const notes=document.getElementById('es-notes').value.trim();
  if(!date||!inT){showToast('Date and start time required.');return;}
  const ci=new Date(`${date}T${inT}:00`);
  let co=outT?new Date(`${date}T${outT}:00`):null;
  if(co&&co<=ci)co=new Date(co.getTime()+86400000);
  const mins=co?(co-ci)/60000-brk:0;
  try{
    await dbPatch('shifts',shiftId,{clock_in:ci.toISOString(),clock_out:co?co.toISOString():null,break_minutes:brk,total_hours:Math.max(0,mins/60).toFixed(2),adjusted_by:ME.id,notes:notes||null,status:approve?'completed':'pending_approval'});
    editingShiftId=null;showToast('Saved ✓','ok');setTimeout(()=>setTab('timesheets'),600);
  }catch(e){showToast('Error: '+e.message);}
}

    const tipShare=staffWorked.size>0?(parseFloat(p.tips_total)||0)/staffWorked.size:0;
    let totalPay=0;
    shifts.forEach(s=>{const st=ALL_STAFF.find(m=>m.id===s.staff_id);totalPay+=(parseFloat(s.total_hours)||0)*(st?st.hourly_rate:0);});
    const myS=shifts.filter(s=>s.staff_id===ME.id);
    const myH=myS.reduce((t,s)=>t+(parseFloat(s.total_hours)||0),0);
    const myP=myH*(ME.hourly_rate||0),myT=staffWorked.has(ME.id)?tipShare:0;
    h+=`<div class="pay-card">
      <div class="pay-card-period">${fmtDateShort(p.start_date)} – ${fmtDateShort(p.end_date)}</div>
      <div class="pay-card-amount">£${(myP+myT).toFixed(2)}</div>
      <div class="pay-card-detail">${myH.toFixed(1)}h × £${parseFloat(ME.hourly_rate||0).toFixed(2)}/hr = £${myP.toFixed(2)}</div>
      ${myT>0?`<div class="tips-badge">+ £${myT.toFixed(2)} tips</div>`:''}
    </div>`;
    if(isManager()){
      h+=`<div class="card" style="margin-top:-8px;border-radius:0 0 var(--radius) var(--radius)">
        <div style="font-size:13px;margin-bottom:10px">Total wages: <strong>£${totalPay.toFixed(2)}</strong> · Tips pot: 
          ${isSuperAdmin()?`£<input type="number" step="0.01" value="${p.tips_total||0}" style="width:80px;border:1px solid var(--border);border-radius:5px;padding:3px 6px" onchange="updateTips('${p.id}',+this.value)">`:`<strong>£${parseFloat(p.tips_total||0).toFixed(2)}</strong>`}
          split ${staffWorked.size} ways = £${tipShare.toFixed(2)} each
        </div>
        <div class="tbl-scroll"><table class="data-table" style="font-size:12px"><thead><tr><th>Staff</th><th class="r">Hrs</th><th class="r">Wages</th><th class="r">Tips</th><th class="r">Total</th></tr></thead><tbody>`;
      ALL_STAFF.forEach(st=>{
        const sts=shifts.filter(s=>s.staff_id===st.id);if(!sts.length)return;
        const hrs=sts.reduce((t,s)=>t+(parseFloat(s.total_hours)||0),0);
        const wages=hrs*(st.hourly_rate||0),tips=staffWorked.has(st.id)?tipShare:0;
        h+=`<tr><td>${st.name}</td><td class="r">${hrs.toFixed(1)}</td><td class="r">£${wages.toFixed(2)}</td><td class="r">£${tips.toFixed(2)}</td><td class="r"><strong>£${(wages+tips).toFixed(2)}</strong></td></tr>`;
      });
      h+=`</tbody></table></div></div>`;
    }
  }
  return h;
}
async function createPayPeriod(){
  const s=document.getElementById('pp-start').value,e=document.getElementById('pp-end').value;
  if(!s||!e){showToast('Please set start and end dates.');return;}

}

async function uploadAvatar(input){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){showToast('Photo must be under 5MB');return;}
  const preview=document.getElementById('profile-avatar-preview');
  if(preview)preview.innerHTML=`<div style="font-size:12px;color:var(--muted)">Uploading…</div>`;
  showToast('Uploading…','ok');
  try{
    const ext=file.name.split('.').pop().toLowerCase()||'jpg';
    const path=`${ME.id}.${ext}`;
    let uploaded=false;
    for(const key of [SB.key,SB.jwt]){
      const r=await fetch(`${SB.url}/storage/v1/object/profile-pics/${path}`,{method:'PUT',headers:{'apikey':key,'Authorization':'Bearer '+key,'Content-Type':file.type||'image/jpeg','x-upsert':'true'},body:file});
      if(r.ok){uploaded=true;break;}
      if(key===SB.key){const tx=await r.text();console.warn('Key 1 failed:',r.status,tx.slice(0,100));}
      else{const tx=await r.text();throw new Error(`Upload ${r.status}: ${tx.slice(0,120)}`);}
    }
    if(!uploaded)throw new Error('Both keys failed for upload');
    const url=`${SB.url}/storage/v1/object/public/profile-pics/${path}?t=${Date.now()}`;
    await dbPatch('staff',ME.id,{avatar_url:url});
    ME.avatar_url=url;saveSession();
    document.getElementById('tb-avatar').innerHTML=avatarHtml(ME,30);
    if(preview)preview.innerHTML=`<img src="${url}" style="width:100px;height:100px;border-radius:50%;object-fit:cover">`;
    const idx=ALL_STAFF.findIndex(s=>s.id===ME.id);if(idx>=0)ALL_STAFF[idx].avatar_url=url;
    showToast('Photo updated ✓','ok');input.value='';
  }catch(e){showToast('Upload error: '+e.message);if(preview)preview.innerHTML=avatarHtml(ME,100);}
}
async function saveProfile(){
  const name=document.getElementById('p-name').value.trim();
  const email=document.getElementById('p-email').value.trim();
  const phone=document.getElementById('p-phone').value.trim();
  const address=document.getElementById('p-address').value.trim();
  if(!name){showToast('Name cannot be empty.');return;}
  try{
    await dbPatch('staff',ME.id,{name,email,phone,address});
    ME={...ME,name,email,phone,address};saveSession();
    document.getElementById('tb-name').textContent=ME.name.split(' ')[0];
    const idx=ALL_STAFF.findIndex(s=>s.id===ME.id);if(idx>=0)ALL_STAFF[idx]={...ALL_STAFF[idx],name,email,phone,address};
    showMsg('profile-msg','Profile saved!','ok');
  }catch(e){showMsg('profile-msg','Error: '+e.message,'err');}
}
async function changePIN(){
  const np=document.getElementById('new-pin').value,cp=document.getElementById('confirm-pin').value;
  if(!/^\d{4}$/.test(np)){showMsg('profile-msg','PIN must be 4 digits.','err');return;}
  if(np!==cp){showMsg('profile-msg','PINs do not match.','err');return;}
  if(np==='0000'){showMsg('profile-msg','Choose a different PIN — 0000 is the default.','err');return;}
  try{await dbPatch('staff',ME.id,{pin_hash:np});ME.pin_hash=np;saveSession();showMsg('profile-msg','✓ PIN updated!','ok');document.getElementById('new-pin').value='';document.getElementById('confirm-pin').value='';}
  catch(e){showMsg('profile-msg','Error: '+e.message,'err');}
}

async function addStaff(){
  const name=document.getElementById('ns-name').value.trim();
  const role=document.getElementById('ns-role').value;
  const email=document.getElementById('ns-email').value.trim();
  const phone=document.getElementById('ns-phone').value.trim();
  const rate=parseFloat(document.getElementById('ns-rate').value)||0;
  const team=document.getElementById('ns-team').value||'foh';
  if(!name){showMsg('add-staff-msg','Name is required.','err');return;}
  try{
    const result=await dbPost('staff',{name,role,email,phone,hourly_rate:rate,pin_hash:'0000',is_active:true,team});
    const newStaff=Array.isArray(result)?result[0]:result;
    if(newStaff){ALL_STAFF.push(newStaff);ALL_STAFF.sort((a,b)=>a.name.localeCompare(b.name));}
    showMsg('add-staff-msg',`✓ ${name} added. Default PIN is 0000.`,'ok');
    ['ns-name','ns-email','ns-phone','ns-rate'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    setTimeout(()=>setTab('staff-admin'),800);
  }catch(e){showMsg('add-staff-msg','Error: '+e.message,'err');}
}
async function updateStaffField(id,field,val){
  try{
    await dbPatch('staff',id,{[field]:val});
    const st=ALL_STAFF.find(s=>s.id===id);if(st)st[field]=val;
    showToast(`✓ Updated`,'ok');
  }catch(e){showToast('Error: '+e.message);}
}
async function updateRate(id,val){return updateStaffField(id,'hourly_rate',val);}
async function updateTeam(id,val){return updateStaffField(id,'team',val);}
async function archiveStaff(id,name){
  try{
    await dbPatch('staff',id,{is_active:false});
    ALL_STAFF=ALL_STAFF.filter(s=>s.id!==id);
    showToast(`${name} archived — shift history kept`,'ok');
    setTimeout(()=>setTab('staff-admin'),600);
  }catch(e){showToast('Error: '+e.message);}
}
async function resetPIN(id,name){
  try{await dbPatch('staff',id,{pin_hash:'0000'});showToast(`${name}'s PIN reset to 0000`,'ok');}
  catch(e){showToast('Error: '+e.message);}
}
async function toggleActive(id,active){
  try{await dbPatch('staff',id,{is_active:active});const st=ALL_STAFF.find(s=>s.id===id);if(st)st.is_active=active;}
  catch(e){showToast('Error: '+e.message);}
}
async function removeStaff(id,name){return archiveStaff(id,name);}

/* ── UTILS ── */
function fmtHHMM(d){return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function fmtTime(iso){if(!iso)return'—';return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function fmtDateShort(str){if(!str)return'—';return new Date(str+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function fmtElapsed(from){const mins=Math.floor((Date.now()-from)/60000),h=Math.floor(mins/60),m=mins%60;return h>0?`${h}h ${m}m`:`${m}m`;}
function showMsg(id,msg,type){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="alert ${type}">${msg}</div>`;}

/* ── INIT ── */
async function init(){
  const saved=loadSession();
  if(saved){
    try{
      ALL_STAFF=await dbGet('staff','is_active=eq.true&order=name.asc');
      const fresh=ALL_STAFF.find(s=>s.id===saved.id);
      ME=fresh||saved;saveSession();
      document.getElementById('login-screen').style.display='none';
      launchApp();return;
    }catch(e){ME=saved;ALL_STAFF=[saved];document.getElementById('login-screen').style.display='none';launchApp();return;}
  }
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  loadStaffList();
}
init();
</script>
